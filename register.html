<script>
/* Bắt UTM/fbclid từ URL quảng cáo → localStorage (last-touch, giữ 7 ngày).
   window.alnGetUtm/alnGetFbp/alnGetFbc dùng ở doRegister để ghi kèm user CN
   mới — cùng pattern đã dùng ở tuyen-kts.html/phong-cho.html/home.html. */
(function(){
  try{
    var parts = location.search.substring(1).split('&');
    var utm = {}; var found = false;
    for (var i = 0; i < parts.length; i++) {
      var kv = parts[i].split('=');
      if (kv.length < 2 || !kv[1]) continue;
      var k = decodeURIComponent(kv[0]);
      var v = decodeURIComponent(kv[1].replace(/\+/g, ' '));
      if (k.indexOf('utm_') === 0) { utm[k.substring(4)] = v.slice(0, 120); found = true; }
      if (k === 'fbclid') { utm.fbclid = v.slice(0, 200); found = true; }
    }
    if (found) { utm.ts = Date.now(); localStorage.setItem('aln_utm', JSON.stringify(utm)); }
  }catch(e){}
  window.alnGetUtm = function(){
    try{
      var s = localStorage.getItem('aln_utm');
      if (!s) return {};
      var o = JSON.parse(s);
      if (o.ts && Date.now() - o.ts > 7 * 864e5) return {};
      return o;
    }catch(e){ return {}; }
  };
  window.alnGetCookie = function(name){
    var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  };
  window.alnGetFbp = function(){ return window.alnGetCookie('_fbp'); };
  window.alnGetFbc = function(){
    var c = window.alnGetCookie('_fbc');
    if (c) return c;
    var u = window.alnGetUtm();
    if (u.fbclid) return 'fb.1.' + Date.now() + '.' + u.fbclid;
    return '';
  };
})();
</script>
<style>
:root{
  --ink:#08080a;--ink2:#111114;--ink3:#18181c;--ink4:#222228;
  --border:rgba(201,168,76,0.16);--border2:rgba(201,168,76,0.28);
  --text:#F0EBE0;--text2:rgba(240,235,224,0.7);--sub:rgba(240,235,224,0.44);--muted:rgba(240,235,224,0.28);
  --gold:#C9A84C;--gold2:#d4b86a;--gold-bg:rgba(201,168,76,.08);
  --green:#22c97a;--green-bg:rgba(34,201,122,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --amber:#ffaa33;--blue:#38bdf8;
  --r:12px;--r-sm:8px;
  --sans:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;--syne:'Syne',sans-serif;--serif:'Cormorant Garamond',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;height:100%}
body{font-family:var(--sans);background:var(--ink);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none;z-index:0}

.page{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:32px 16px}

.brand{text-align:center;margin-bottom:28px}
.brand-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:10px}
.brand-box{background:var(--gold-bg);border:1.5px solid rgba(201,168,76,.3);border-radius:10px;padding:7px 14px;font-family:var(--syne);font-size:15px;font-weight:800;letter-spacing:.08em;color:var(--gold)}
.brand-title{font-family:var(--serif);font-size:26px;font-weight:300;font-style:italic;color:var(--text);line-height:1.2;margin-bottom:5px}
.brand-sub{font-size:12px;color:var(--sub)}

.role-tabs{display:flex;gap:6px;background:var(--ink3);border:1px solid var(--border);border-radius:var(--r);padding:4px;width:100%;max-width:460px}
.role-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border-radius:9px;cursor:pointer;transition:all .18s;border:1.5px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.role-tab:hover{background:rgba(201,168,76,.06)}
.role-tab.active{background:var(--gold-bg);border-color:rgba(201,168,76,.3)}
.role-tab .rt-icon{font-size:20px;line-height:1}
.role-tab .rt-label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.04em;text-align:center;transition:color .18s}
.role-tab.active .rt-label{color:var(--gold)}
.role-tab .rt-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:background .18s}
.role-tab.active .rt-dot{background:var(--gold)}

.reg-card{width:100%;max-width:460px;background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5);margin-top:8px}
.card-top{padding:20px 24px 0}
.role-label-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.role-icon-big{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.role-title{font-family:var(--serif);font-size:17px;font-weight:600;font-style:italic;color:var(--text)}
.role-desc{font-size:11px;color:var(--sub)}

.form-body{padding:0 24px 24px}
.field{margin-bottom:14px}
.field label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.field-wrap{position:relative}
.field-wrap .fi{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.field input{width:100%;background:var(--ink3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px 10px 34px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.field input:focus{border-color:rgba(201,168,76,.45);background:var(--ink4)}
.field input::placeholder{color:var(--muted)}
.field-hint{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}

.username-wrap{position:relative}
.username-wrap input{padding-right:38px}
.refresh-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;transition:color .15s;display:flex;align-items:center}
.refresh-btn:hover{color:var(--gold)}
.username-status{display:flex;align-items:center;gap:5px;font-size:10px;margin-top:4px;min-height:16px;font-family:var(--mono)}
.username-status.ok{color:var(--green)}
.username-status.err{color:var(--red)}
.username-status.checking{color:var(--muted)}

.field-pw .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;transition:color .15s}
.field-pw .eye:hover{color:var(--text2)}

.pw-strength{display:flex;gap:3px;margin-top:5px}
.pw-strength span{flex:1;height:3px;border-radius:2px;background:var(--ink4);transition:background .2s}
.pw-strength.s1 span:nth-child(1){background:var(--red)}
.pw-strength.s2 span:nth-child(-n+2){background:var(--amber)}
.pw-strength.s3 span:nth-child(-n+3){background:var(--gold)}
.pw-strength.s4 span{background:var(--green)}

.msg-box{border-radius:var(--r-sm);padding:10px 12px;font-size:12px;display:none;align-items:center;gap:8px;margin-bottom:14px}
.msg-box.show{display:flex}
.msg-error{background:var(--red-bg);border:1px solid rgba(239,68,68,.25);color:var(--red)}

.pending-note{background:rgba(255,170,51,.06);border:1px solid rgba(255,170,51,.2);border-radius:var(--r-sm);padding:10px 12px;font-size:11px;color:rgba(240,235,224,.6);display:flex;align-items:flex-start;gap:8px;margin-bottom:14px;line-height:1.6}
.pending-note i{font-size:15px;color:var(--amber);flex-shrink:0;margin-top:1px}

.btn-reg{width:100%;padding:13px;background:linear-gradient(135deg,#C9A84C,#d4b86a);border:none;border-radius:var(--r-sm);font-family:var(--syne);font-size:13px;font-weight:700;letter-spacing:.06em;color:#000;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:4px}
.btn-reg:hover{opacity:.9}
.btn-reg:active{transform:scale(.98)}
.btn-reg:disabled{opacity:.45;cursor:not-allowed}

.redirect-overlay{position:fixed;inset:0;background:var(--ink);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
.redirect-overlay.show{display:flex}
.redirect-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.redirect-msg{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--text2);text-align:center}
.redirect-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}

.success-overlay{position:fixed;inset:0;background:var(--ink);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:0}
.success-overlay.show{display:flex}
.success-icon{width:72px;height:72px;border-radius:50%;background:rgba(201,168,76,.1);border:2px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--gold);margin-bottom:20px}
.success-title{font-family:var(--serif);font-size:26px;font-weight:600;font-style:italic;color:var(--text);margin-bottom:8px;text-align:center}
.success-desc{font-size:12px;color:var(--sub);text-align:center;max-width:340px;line-height:1.7;margin-bottom:20px}
.success-info{background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;font-size:11px;color:var(--text2);max-width:380px;width:100%;line-height:2;margin-bottom:24px;font-family:var(--mono)}
.success-info b{color:var(--gold);font-weight:600}
.btn-back{padding:11px 28px;background:none;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-family:var(--sans);font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}

.reg-footer{margin-top:20px;text-align:center;font-size:11px;color:var(--muted)}
.reg-footer a{color:var(--sub);text-decoration:none;transition:color .15s}
.reg-footer a:hover{color:var(--text2)}

.ph-spin{animation:phspin 1s linear infinite;display:inline-block}
@keyframes phspin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

@media(max-width:500px){
  .form-body,.card-top{padding-left:16px;padding-right:16px}
  .brand-title{font-size:22px}
}
</style>
</head>

<script>
window.ALN_FIREBASE_READY = new Promise(function(res){ window.__ALN_FB_RESOLVE = res; });

var activeRole = 'cn';
var _usernameCheckTimer = null;
var _usernameValid = false;

var KTS_BEE = '<svg viewBox="0 0 100 100" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><polygon points="94,50 72,88 28,88 6,50 28,12 72,12" fill="none" stroke="#C9A84C" stroke-width="4"/><ellipse cx="33" cy="40" rx="14" ry="21" fill="none" stroke="#C9A84C" stroke-width="8" transform="rotate(-20 33 40)"/><path d="M52 36C54 29 62 28 63 34C64 38 58 39 52 37Z" fill="#C9A84C"/><path d="M27 56C19 62 18 72 24 77C30 82 41 75 41 64C41 57 35 52 28 54Z" fill="#9a7820"/><path d="M26 60C21 66 21 73 25 76" stroke="#C9A84C" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M35 60C30 65 31 73 35 75C39 77 46 73 46 65C46 58 41 56 37 58Z" fill="#7a5810"/><circle cx="51" cy="51" r="5" fill="#C9A84C"/><circle cx="64" cy="42" r="9" fill="#C9A84C"/><circle cx="65" cy="44" r="3.5" fill="#7a5010"/><path d="M68 34Q72 26 75 21" stroke="#C9A84C" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="75" cy="21" r="2.5" fill="#C9A84C"/><path d="M60 33Q57 26 55 21" stroke="#C9A84C" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="55" cy="21" r="2" fill="#C9A84C"/><path d="M53 56C49 63 47 75 51 83C53 89 61 91 66 85C71 77 69 64 64 57C62 53 55 52 53 56Z" fill="#C9A84C"/><path d="M49 68Q57.5 72 66 68" stroke="#5a3c08" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M49 77Q57.5 81 66 77" stroke="#5a3c08" stroke-width="3" fill="none" stroke-linecap="round"/></svg>';
var ROLE_META = {
  cn:  { icon:'<i class="ph-duotone ph-user"></i>',       title:'Chủ nhà',       desc:'Theo dõi tiến độ công trình & trao đổi với KTS',  color:'var(--green)', bg:'rgba(34,201,122,.1)',  pending:false },
  kts: { icon:KTS_BEE,                                    title:'Kiến trúc sư',  desc:'Nhận dự án, quản lý bản vẽ & thu nhập trên ALN',  color:'var(--amber)', bg:'rgba(255,170,51,.1)',  pending:true  },
  dn:  { icon:'<i class="ph-duotone ph-buildings"></i>',  title:'Doanh nghiệp',  desc:'Quản lý danh mục dự án & đội ngũ kiến trúc sư',   color:'var(--blue)',  bg:'rgba(56,189,248,.1)', pending:true  },
};
var PENDING_NOTES = {
  kts: 'KTS đăng ký nhanh bằng tên + SĐT ở Phòng chờ, rồi nộp hồ sơ hành nghề (portfolio, CCHN) để Founder xét duyệt.',
  dn:  'Doanh nghiệp đăng ký nhanh bằng tên + SĐT ở Phòng chờ, rồi nộp hồ sơ pháp nhân (GPKD, mã số thuế) để Founder xét duyệt.',
};

function switchRole(role){
  activeRole = role;
  document.querySelectorAll('.role-tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.role === role);
  });
  hideError();
  renderCardTop();
  regenerateUsername();
}

function renderCardTop(){
  var m = ROLE_META[activeRole];
  document.getElementById('cardTop').innerHTML =
    '<div class="role-label-row">' +
      '<div class="role-icon-big" style="background:' + m.bg + ';border:1.5px solid ' + m.color + '30">' + m.icon + '</div>' +
      '<div><div class="role-title">Đăng ký — ' + m.title + '</div>' +
      '<div class="role-desc">' + m.desc + '</div></div>' +
    '</div>';
  var pn = document.getElementById('pendingNote');
  document.getElementById('pendingNoteText').textContent = PENDING_NOTES[activeRole] || '';
  pn.style.display = m.pending ? 'flex' : 'none';

  /* CN: chỉ Tên + SĐT. KTS/DN: ẩn form, bấm là sang Phòng chờ nộp hồ sơ đầy đủ. */
  var isCn = activeRole === 'cn';
  function _show(id, on){ var el = document.getElementById(id); if(el) el.style.display = on ? '' : 'none'; }
  _show('fieldName', isCn);
  _show('fieldPhone', isCn);
  _show('fieldUser', false);
  _show('fieldPw', false);
  _show('fieldPw2', false);
  var btn = document.getElementById('btnReg');
  if(btn) btn.innerHTML = isCn
    ? '<i class="ph-duotone ph-user-plus" style="margin-right:6px"></i> Tạo tài khoản'
    : '<i class="ph-duotone ph-arrow-right" style="margin-right:6px"></i> Vào Phòng chờ nộp hồ sơ';
}

function removeDiacritics(str){
  return str.normalize('NFD')
    .replace(/[̀-ͯ]/g,'')
    .replace(/đ/g,'d').replace(/Đ/g,'D')
    .replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
}

function nameToUsername(name, role){
  var clean = removeDiacritics(name);
  return role + '.' + (clean || 'user');
}

function onNameInput(){
  regenerateUsername();
}

function regenerateUsername(){
  var name = document.getElementById('inputName').value.trim();
  var base = nameToUsername(name || 'user', activeRole);
  document.getElementById('inputUser').value = base;
  scheduleUsernameCheck(base);
}

function onUsernameInput(){
  var val = document.getElementById('inputUser').value.trim().toLowerCase();
  scheduleUsernameCheck(val);
}

function scheduleUsernameCheck(username){
  _usernameValid = false;
  clearTimeout(_usernameCheckTimer);
  var el = document.getElementById('usernameStatus');
  el.className = 'username-status checking';
  el.innerHTML = '<i class="ph-duotone ph-circle-notch ph-spin"></i> Đang kiểm tra...';
  _usernameCheckTimer = setTimeout(function(){ checkUsername(username); }, 700);
}

async function checkUsername(username){
  var el = document.getElementById('usernameStatus');
  if(!username || username.length < 5){
    el.className = 'username-status err';
    el.innerHTML = '<i class="ph-duotone ph-x-circle"></i> Tối thiểu 5 ký tự';
    _usernameValid = false; return;
  }
  if(!/^[a-z]{2,4}\.[a-z][a-z0-9]{1,}$/.test(username)){
    el.className = 'username-status err';
    el.innerHTML = '<i class="ph-duotone ph-x-circle"></i> Định dạng không hợp lệ (vd: cn.tennguoi)';
    _usernameValid = false; return;
  }
  try {
    var fb = await window.ALN_FIREBASE_READY;
    var q = fb.query(fb.collection(fb.db,'users'), fb.where('username','==',username), fb.lim(1));
    var snap = await fb.getDocs(q);
    if(snap.empty){
      el.className = 'username-status ok';
      el.innerHTML = '<i class="ph-duotone ph-check-circle"></i> Tên đăng nhập hợp lệ';
      _usernameValid = true;
    } else {
      _usernameValid = false;
      var num = Math.floor(Math.random()*900+10);
      var sug = username + num;
      el.className = 'username-status err';
      el.innerHTML = '<i class="ph-duotone ph-x-circle"></i> Đã tồn tại. Thử: <b style="cursor:pointer;text-decoration:underline;color:var(--gold)" onclick="useSuggest(\'' + sug + '\')">' + sug + '</b>';
    }
  } catch(e){
    el.className = 'username-status checking';
    el.innerHTML = '<i class="ph-duotone ph-warning"></i> Không kiểm tra được — sẽ thử lại khi đăng ký';
    _usernameValid = true;
  }
}

function useSuggest(u){
  document.getElementById('inputUser').value = u;
  scheduleUsernameCheck(u);
}

function togglePw(inputId, iconId){
  var inp = document.getElementById(inputId);
  var ico = document.getElementById(iconId);
  if(inp.type === 'password'){
    inp.type = 'text';
    ico.className = 'ph-duotone ph-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'ph-duotone ph-eye';
  }
}

function pwScore(pw){
  var s = 0;
  if(pw.length >= 8) s++;
  if(/[A-Z]/.test(pw)) s++;
  if(/[0-9]/.test(pw)) s++;
  if(/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
}

function onPwInput(){
  var pw = document.getElementById('inputPw').value;
  document.getElementById('pwStrength').className = 'pw-strength' + (pw ? ' s' + pwScore(pw) : '');
}

function hideError(){
  document.getElementById('msgError').classList.remove('show');
}
function showError(msg){
  var el = document.getElementById('msgError');
  document.getElementById('msgErrorTxt').textContent = msg;
  el.classList.add('show');
  var card = document.querySelector('.reg-card');
  card.style.animation = 'none';
  setTimeout(function(){ card.style.animation = 'shake .35s ease'; }, 10);
}
function resetBtn(){
  var btn = document.getElementById('btnReg');
  btn.disabled = false;
  btn.innerHTML = '<i class="ph-duotone ph-user-plus" style="margin-right:6px"></i> Tạo tài khoản';
}

async function doRegister(){
  hideError();

  /* KTS & DN: không đăng ký ở đây — sang Phòng chờ đăng ký nhanh + nộp hồ sơ đầy đủ */
  if(activeRole === 'kts' || activeRole === 'dn'){
    var room = activeRole === 'kts' ? 'architect' : 'business';
    window.location.href = 'aln-giu-cho/phong-cho.html?room=' + room;
    return;
  }

  /* CN: chỉ Tên + SĐT */
  var name  = document.getElementById('inputName').value.trim();
  var phone = document.getElementById('inputPhone').value.replace(/[\s.\-()]/g, '');

  if(!name){ showError('Vui lòng nhập họ và tên.'); return; }
  if(!/^0\d{8,10}$/.test(phone)){ showError('Số điện thoại chưa hợp lệ (VD: 0909xxxxxx).'); return; }

  var btn = document.getElementById('btnReg');
  btn.disabled = true;
  btn.innerHTML = '<i class="ph-duotone ph-circle-notch ph-spin" style="margin-right:6px"></i> Đang tạo tài khoản...';

  try {
    var fb = await Promise.race([
      window.ALN_FIREBASE_READY,
      new Promise(function(_,rej){ setTimeout(function(){ rej(new Error('SDK_TIMEOUT')); }, 15000); })
    ]);

    var email = phone + '@aln.vn';

    /* Tạo (hoặc đăng nhập nếu SĐT đã có) tài khoản bằng SĐT — mật khẩu = SĐT */
    var uid;
    try {
      var cred = await fb.createUserWithEmailAndPassword(fb.auth, email, phone);
      uid = cred.user.uid;
    } catch(e){
      if(e && e.code === 'auth/email-already-in-use'){
        var c2 = await fb.signInWithEmailAndPassword(fb.auth, email, phone);
        uid = c2.user.uid;
      } else throw e;
    }

    /* Công người giới thiệu (KTS) — do link định danh /kts/{code} lưu ở localStorage */
    var ktsRef = null;
    try {
      var _r = JSON.parse(localStorage.getItem('aln_kts_ref') || 'null');
      if(_r && typeof _r.code === 'string' && /^KTS-\d+$/.test(_r.code)) ktsRef = _r.code;
    } catch(e){}

    /* Ghi users nếu chưa có (tránh ghi đè tài khoản cũ) */
    var uref = fb.doc(fb.db, 'users', uid);
    var usnap = await fb.getDoc(uref);
    if(!usnap.exists()){
      /* Metadata quảng cáo — onCnRegistered (functions/ktsFunnel.js) đọc các
         field này để bắn CAPI CompleteRegistration server-side, dedup với
         Pixel client bên dưới qua event_id 'cnreg-'+uid. */
      var utm = window.alnGetUtm ? window.alnGetUtm() : {};
      var fbp = window.alnGetFbp ? window.alnGetFbp() : '';
      var fbc = window.alnGetFbc ? window.alnGetFbc() : '';
      await fb.setDoc(uref, {
        username: phone, name: name, phone: phone, role: 'cn', email: email,
        status: 'active', plan: 'free', credits: {}, kts_ref: ktsRef,
        utm: utm, fbp: fbp, fbc: fbc, sourceUrl: location.origin + location.pathname,
        createdAt: fb.serverTimestamp(),
      });
      try {
        if (window.fbq) fbq('track', 'CompleteRegistration',
          { content_name: 'register-cn', content_category: 'cn-funnel' },
          { eventID: 'cnreg-' + uid });
      } catch(e){}
    } else if(ktsRef){
      await fb.setDoc(uref, { kts_ref: ktsRef }, { merge: true });
    }
    if(ktsRef){ try { localStorage.removeItem('aln_kts_ref'); } catch(e){} }

    var ud = JSON.stringify({ name: name, userId: phone, role: 'cn', badge: 'Chủ nhà', uid: uid });
    try { localStorage.setItem('aln_user', ud); } catch(e){}
    try { sessionStorage.setItem('aln_user', ud); } catch(e){}

    /* Đăng ký TỪ diễn đàn → quay lại forum; ngược lại vào client_CN */
    var _fwd = null;
    try {
      var _fr = JSON.parse(sessionStorage.getItem('forumReturn') || 'null');
      if(_fr && (Date.now() - (_fr.t || 0) < 30 * 60000)){
        sessionStorage.removeItem('forumReturn');
        _fwd = 'forum.html' + (_fr.thread ? '?thread=' + encodeURIComponent(_fr.thread) : '');
      }
    } catch(e){}
    document.getElementById('redirectMsg').textContent = 'Chào mừng, ' + name + '!';
    document.getElementById('redirectSub').textContent = _fwd ? 'Đang quay lại diễn đàn...' : 'Đang vào trang Chủ nhà...';
    document.getElementById('redirectOverlay').classList.add('show');
    setTimeout(function(){
      window.location.replace(_fwd || ('client_CN.html?u=' + encodeURIComponent(phone) + '&r=cn'));
    }, 900);

  } catch(err){
    var code = (err && err.code) || '';
    if(code === 'auth/wrong-password' || code === 'auth/invalid-credential'){
      showError('Số điện thoại này đã được đăng ký. Vui lòng dùng "Đăng nhập" để vào.');
    } else if(code === 'auth/network-request-failed'){
      showError('Lỗi kết nối mạng. Vui lòng kiểm tra Internet và thử lại.');
    } else if(err && err.message === 'SDK_TIMEOUT'){
      showError('Không tải được hệ thống xác thực. Kiểm tra kết nối mạng.');
    } else {
      showError('Có lỗi xảy ra [' + (code || '?') + ']: ' + ((err && err.message) || ''));
    }
    resetBtn();
  }
}

renderCardTop();
regenerateUsername();
</script>

<script type="module">
import {
  auth, db, signOut,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  doc, getDoc, setDoc, collection, getDocs, query, where, limit, serverTimestamp
} from "./firebase-config.js";

window.__ALN_FB_RESOLVE({
  auth, db, signOut,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  doc, getDoc, setDoc,
  collection, getDocs,
  query, where,
  lim: limit,
  serverTimestamp,
});
</script>
