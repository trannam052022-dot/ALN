const STATUS_MAP = {
  dispute: { label:'❌ Tranh chấp', cls:'status-dispute' },
  sla:     { label:'⏰ Trễ SLA',    cls:'status-sla' },
  pending: { label:'👁️ Chờ duyệt', cls:'status-pending' },
  ok:      { label:'🟢 Trơn tru',   cls:'status-ok' },
  done:    { label:'✅ Hoàn thành', cls:'status-done' },
};
const ACTION_MAP = {
  dispute: { label:'XỬ LÝ',  cls:'ab-handle' },
  sla:     { label:'XỬ LÝ',  cls:'ab-handle' },
  pending: { label:'DUYỆT',  cls:'ab-approve' },
  ok:      { label:'Xem',    cls:'ab-view' },
  done:    { label:'Xem',    cls:'ab-view' },
};

function getFilteredRows() {
  return ROWS.filter(r => {
    if (activeFilter === 'DISPUTE'    && r.status !== 'dispute') return false;
    if (activeFilter === 'SLA_BREACH' && r.status !== 'sla')     return false;
    if (activeFilter === 'C3_PENDING' && !(r.stage === 'C3' && r.status === 'pending')) return false;
    if (activeFilter === 'RUNNING'    && (r.status === 'done')) return false;
    if (activeFilter === 'DONE'       && r.status !== 'done')  return false;

    const q = searchQ.toLowerCase();
    if (q && !r.id.toLowerCase().includes(q) &&
             !r.cn.toLowerCase().includes(q) &&
             !r.ktsName.toLowerCase().includes(q)) return false;
    if (filterFloor  && r.floor  !== filterFloor)  return false;
    if (filterInvest && r.invest !== filterInvest) return false;
    if (filterStage  && r.stage  !== filterStage)  return false;
    return true;
  });
}

let _tblShown = 0;
const _TBL_PAGE = (window.innerWidth <= 768) ? 15 : 40; // mobile render ít để nhẹ bộ nhớ

function renderTableMore(){ _tblShown += _TBL_PAGE; renderTable(true); }

function renderTable(keepShown) {
  const allRows = getFilteredRows();
  const tbody = document.getElementById('tableBody');
  if (!allRows.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--mute)">Không có dự án phù hợp</td></tr>`;
    return;
  }
  if (!keepShown) _tblShown = _TBL_PAGE;
  const rows = allRows.slice(0, _tblShown);
  const moreCount = allRows.length - rows.length;
  const moreRow = moreCount > 0
    ? `<tr><td colspan="7" style="text-align:center;padding:12px"><button onclick="renderTableMore()" style="background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:9px 22px;color:#C9A84C;font-weight:700;font-size:12px;cursor:pointer">▾ Xem thêm ${moreCount} dự án</button></td></tr>`
    : '';
  tbody.innerHTML = rows.map(r => {
    const sm  = STATUS_MAP[r.status] || STATUS_MAP.ok;
    const am  = ACTION_MAP[r.status] || ACTION_MAP.ok;
    const fmtMoney = v => v >= 1000000 ? (v/1000000).toFixed(1).replace('.0','')+'M' : (v/1000).toFixed(0)+'K';
    return `<tr class="${r.rowClass}" onclick="openDrawer('${r.id}')">
      <td><div class="col-id">${r.id}</div><div style="font-size:10px;color:var(--mute);margin-top:2px">${r.contract}</div></td>
      <td><div class="col-person">${r.cn}</div><div class="col-person-sub">${r.invest}</div></td>
      <td><div class="col-person">${r.ktsName}</div><div class="col-person-sub">${r.floor}</div></td>
      <td><span class="stage-badge ${r.stageClass}">${r.stageLabel}</span></td>
      <td><div class="col-money">${fmtMoney(r.frozen * 100)}đ</div></td>
      <td><span class="status-badge ${sm.cls}">${sm.label}</span></td>
      <td>
        <button class="action-btn ${am.cls}" onclick="event.stopPropagation();openDrawer('${r.id}')">
          ${am.label}
        </button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('pageInfo').textContent = `Hiển thị 1–${Math.min(rows.length,10)} / ${rows.length + 96} dự án`;
}

/* ══════════════════════════════════════════
   FILTERS
══════════════════════════════════════════ */
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.stat-cell').forEach(c => c.classList.remove('active'));
  const map = { ALL:'s-all', RUNNING:'s-run', C3_PENDING:'s-c3', DISPUTE:'s-dispute', SLA_BREACH:'s-sla', DONE:'s-done' };
  document.querySelector(`.${map[f]}`)?.classList.add('active');
  renderTable();
}
function filterTable() {
  searchQ      = document.getElementById('searchInput').value;
  filterFloor  = document.getElementById('filterFloor').value;
  filterInvest = document.getElementById('filterInvest').value;
  filterStage  = document.getElementById('filterStage').value;
  renderTable();
}
function sortTable(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  ROWS.sort((a,b) => {
    const av = {id:a.id,cn:a.cn,kts:a.ktsName,stage:a.stage,frozen:a.frozen,status:a.status}[key]||'';
    const bv = {id:b.id,cn:b.cn,kts:b.ktsName,stage:b.stage,frozen:b.frozen,status:b.status}[key]||'';
    if (typeof av === 'number') return (av-bv)*sortDir;
    return av.localeCompare(bv)*sortDir;
  });
  renderTable();
}
function refreshTable() {
  renderTable();
  toast('Đã làm mới dữ liệu', 'info');
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function openDrawer(id) {
  const row = ROWS.find(r => r.id === id);
  if (!row) return;
  currentRow = row;

  // Highlight row
  document.querySelectorAll('.row-active').forEach(r => r.classList.remove('row-active'));
  document.querySelector(`[onclick="openDrawer('${id}')"]`)?.parentElement?.classList.add('row-active');

  // Header
  document.getElementById('dhIcon').textContent = row.status === 'dispute' ? '⚠️' : row.status === 'sla' ? '⏰' : row.status === 'pending' ? '👁️' : '🗂️';
  document.getElementById('dhTitle').textContent = `Chi tiết: ${row.id}`;
  document.getElementById('dhSub').textContent   = `${row.contract} · ${row.cn} · ${row.floor} · ${row.invest}`;

  // Financial grid
  const fin = row.finance;
  const fmtM = v => (v/100).toLocaleString('vi-VN')+'đ';
  const stageMulti = {C1:0.1, C2:0.2, C3:0.6, C4:0.1}[row.stage] || 0.2;
  document.getElementById('finGrid').innerHTML = `
    <div class="fin-box">
      <div class="fin-lbl">Tổng chặng ${row.stage}</div>
      <div class="fin-val">${fmtM(fin.total*100)}</div>
      <div class="fin-sub">${(stageMulti*100).toFixed(0)}% HĐ</div>
    </div>
    <div class="fin-box">
      <div class="fin-lbl">Cty giữ (20%)</div>

  const otp = document.getElementById('otpInput').value;
  if (otp !== '123456') {
    document.getElementById('otpInput').style.borderColor = 'var(--red)';
    toast('❌ OTP không đúng', 'err');
    setTimeout(() => document.getElementById('otpInput').style.borderColor = '', 800);
    return;
  }
  closeOtp();
  const { action, projectId } = pendingOtpAction;

  // Execute
  const msgs = {
    APPROVE:    `🟩 Nghiệm thu đơn phương ${projectId} — Giải ngân cho CTV, thu lợi nhuận về Cty`,
    CANCEL:     `🟥 Hủy dự án ${projectId} — Hoàn tiền KH, phát gậy trừng phạt CTV`,

    WARN_KTS:   `⚠️ Cảnh cáo KTS dự án ${projectId} — Gậy vàng lần 2`,
    REASSIGN:   `🔄 Chuyển KTS khác cho ${projectId} — Mở đấu thầu`,
  };
  toast(msgs[action]||action, action==='CANCEL'?'err':'ok');

  // Update row status in demo
  const row = ROWS.find(r => r.id === projectId);
  if (row) {
    if (action === 'APPROVE' || action === 'C3_APPROVE') row.status = 'done';
    if (action === 'CANCEL') { row.status = 'done'; row.stageLabel = 'Đã hủy'; }

  try{ ALNRealtime.send({ type: action === 'CANCEL' ? 'PROJECT_CANCELLED' : 'PAYOUT_APPROVED',
      projectId, action, executedAt: new Date().toISOString() }); }catch(e){}
}

let toastT;
function toast(msg, type='info') {
  const root = document.getElementById('toasts');
  while(root.children.length >= 4){ root.firstChild.remove(); }
  const el = document.createElement('div');
  const cls = {ok:'toast-ok',err:'toast-err',warn:'toast-warn',info:'toast-info'}[type]||'toast-info';
  el.className = `toast ${cls}`;
  el.textContent = msg;
  root.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},4000);
}

/* ══════════════════════════════════════════
   BROADCAST (nhận từ các trang khác)
══════════════════════════════════════════ */
/**
 * ALN REALTIME v3 — Firestore edition
 * Đồng bộ realtime GIỮA CÁC THIẾT BỊ qua Firestore (collection "messages").
 * Giữ nguyên API cũ: init / send / disconnect / clearHistory / loadHistory
 * Tự fallback về BroadcastChannel + localStorage (cùng máy) nếu Firebase chưa sẵn sàng.
 */
window.ALN_RT_READY = window.ALN_RT_READY || new Promise(function(res){ window.__ALN_RT_RESOLVE = res; });

window.ALNRealtime = (() => {
  let _onMessage = null, _role = '', _userId = '';
  let _unsub = null, _bc = null, _fb = null;
  let _mode = 'connecting';
  const _sent = new Set();     // _cid tin đã gửi phiên này (chặn echo về chính mình)
  const _pending = [];         // tin gửi trước khi kết nối xong
  let _history = [];

  const STORE_KEY = 'aln_msgs';            // chỉ dùng cho chế độ dự phòng
  const STORE_MAX = 100;
  const REPLAY_LIMIT = 50;                 // số tin tối đa nạp lại khi mở trang
  const REPLAY_WINDOW = 3*24*3600*1000;    // chỉ phát lại tin trong 3 ngày gần nhất

  function _dispatch(m){ if(typeof _onMessage==='function'){ try{_onMessage(m);}catch(e){} } }
  function _remember(m){ _history.push(m); if(_history.length>STORE_MAX) _history.splice(0,_history.length-STORE_MAX); }
  function _lsLoad(){ try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch(e){return [];} }
  function _lsSave(m){ try{const a=_lsLoad();a.push(m);if(a.length>STORE_MAX)a.splice(0,a.length-STORE_MAX);localStorage.setItem(STORE_KEY,JSON.stringify(a));}catch(e){} }

  async function init(opts){
    opts = opts || {};
    _role = opts.role||''; _userId = opts.userId||''; _onMessage = opts.onMessage||null;
    const onReady = opts.onReady;

    // Chờ guard xác thực Firebase (tối đa 12 giây)
    const fb = await Promise.race([
      window.ALN_RT_READY,
      new Promise(res=>setTimeout(()=>res(null), 12000))
    ]);

    if (fb && fb.db) {
      _fb = fb;
      try {
        const q = fb.query(fb.collection(fb.db,'messages'), fb.orderBy('ts','asc'), fb.limitToLast(REPLAY_LIMIT));
        let first = true;
        _unsub = fb.onSnapshot(q, snap => {
          if (first) {
            first = false;
            _mode = 'Firestore';
            const cutoff = Date.now() - REPLAY_WINDOW;
            snap.forEach(d => {
              const m = d.data();
              _remember(m);
              if ((m.ts||0) >= cutoff) _dispatch(Object.assign({}, m, {_replay:true}));   // phát lại lịch sử (âm thầm)
            });
            _flushPending();
            onReady && onReady('Firestore');
          } else {
            snap.docChanges().forEach(ch => {
              if (ch.type !== 'added') return;
              const m = ch.doc.data();
              _remember(m);
              if (m._cid && _sent.has(m._cid)) return; // echo tin của chính mình
              _dispatch(m);
            });
          }
        }, err => console.error('[ALNRealtime] snapshot:', err));
        return;
      } catch(e){ console.error('[ALNRealtime] firestore:', e); }
    }

    /* ── CHẾ ĐỘ DỰ PHÒNG (cùng thiết bị) ── */
    _mode = 'local';
    const hist = _lsLoad();
    hist.forEach(m=>_remember(m));
    setTimeout(()=>{ hist.forEach(m=>_dispatch(Object.assign({}, m, {_replay:true}))); }, 100);
    if (typeof BroadcastChannel !== 'undefined') {
      try {
        _bc = new BroadcastChannel('aln_realtime_v2');
        _bc.onmessage = (e)=>{ _lsSave(e.data); _remember(e.data); _dispatch(e.data); };
      } catch(e){}
    }
    _flushPending();
    onReady && onReady('localStorage');
  }

  function _push(full){
    if (_mode==='Firestore' && _fb) {
      _fb.addDoc(_fb.collection(_fb.db,'messages'), full).catch(e=>console.error('[ALNRealtime] send:', e));
    } else if (_mode==='local') {
      _lsSave(full);
      if(_bc){ try{_bc.postMessage(full);}catch(e){} }
    } else {
      _pending.push(full);
    }
  }
  function _flushPending(){ while(_pending.length){ _push(_pending.shift()); } }

  function send(msg){
    let full = { ...msg, _from:_userId, _role:_role, _uid:(window.__ALN_UID||null), ts: Date.now(),
      _cid: 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,8) };
    try { full = JSON.parse(JSON.stringify(full)); } catch(e){}   // loại bỏ undefined
    _sent.add(full._cid);
    _remember(full);
    _push(full);
  }

  function disconnect(){ if(_unsub){try{_unsub();}catch(e){}} if(_bc){try{_bc.close();}catch(e){}} _unsub=null; _bc=null; }
  function clearHistory(){ _history=[]; try{localStorage.removeItem(STORE_KEY);}catch(e){} }
  function loadHistory(){ return _history.slice(); }

  return { init, send, disconnect, clearHistory, loadHistory };
})();

/* Nhận sự kiện realtime toàn hệ thống qua ALNRealtime (Firestore) */
(function(){
  var FU = {};
  try { FU = JSON.parse(sessionStorage.getItem('aln_user')||'{}'); } catch(e){}
  ALNRealtime.init({
    role: 'founder',
    userId: FU.userId || 'founder',
    onReady: function(mode){ console.log('ALN Realtime (Founder):', mode); },
    onMessage: function(d){
      if (d._replay) return; // tin phát lại lịch sử — nạp âm thầm, không bắn thông báo
      try{
        if(d.type==='ALN_CHAT' || d.type==='PIN_ADDED' || d.type==='DISPUTE_OPENED'){
          var _nt = d.type==='DISPUTE_OPENED' ? '🚨 Dispute mới' : 'Tin nhắn từ sàn ALN';
          alnNotify(_nt, (d.senderName||d._from||'') + ': ' + String(d.text||d.pinText||d.projectId||'').slice(0,60));
        }
      }catch(e){}
      if (d.type === 'DISPUTE_OPENED') toast('🚨 Dispute mới: ' + d.projectId + ' · ' + (d.category||''), 'err');
      if (d.type === 'C3_SUBMITTED' || d.type === 'KTS_C3_SUBMITTED') toast('📁 C3 nộp: ' + (d.projectId||'') + ' · ' + (d.ktsName||''), 'info');
      if (d.type === 'DOC_UPLOADED' && d._role !== 'founder') toast('📁 Tài liệu mới: ' + (d.projectId||''), 'info');
      if (d.type === 'KTS_DOC_UPLOAD') toast('📁 KTS upload: ' + ((d.doc&&d.doc.name)||'') + ' · ' + (d.projectId||''), 'info');
      if (d.type === 'ALN_CHAT' && d._role !== 'founder') toast('💬 ' + (d.senderName||d._from||'') + ': ' + String(d.text||'').slice(0,60), 'info');
      if (d.type === 'STAGE_APPROVED') toast('✅ Chặng ' + (d.stage||'') + ' được duyệt: ' + (d.projectId||''), 'ok');
      if (d.type === 'KTS_RATED') toast('⭐ Đánh giá ' + (d.score||'') + '/5 — ' + (d.projName||d.projectId||''), 'ok');
    }
  });
})();

  };

    if(panel) panel.style.display = (tab===t) ? 'flex' : 'none';

        btn.style.cssText = (tab===t) ? liveStyles[tab].active : liveStyles[tab].inactive;

        btn.style.cssText = (tab===t) ? activeStyle : inactiveStyle;

function closeProfile(){
  var dr = document.getElementById('profileDrawer');
  dr.classList.remove('open');
  document.getElementById('profileOverlay').style.display = 'none';
  if(_activeRowId){
    var old = document.getElementById(_activeRowId);
    if(old){
      old.style.background = '';
      old.style.borderLeft = '3px solid transparent';
      old.style.boxShadow = '';
      var nameEl = old.querySelector('.row-name');
      if(nameEl) nameEl.style.color = 'var(--text1)';
    }
    _activeRowId = null;
  }
  setTimeout(function(){ dr.style.display='none'; }, 250);
}

function renderMgKts(){
  _ensureMgData();
  var q   = (document.getElementById('mgKtsSearch') ? document.getElementById('mgKtsSearch').value : '').toLowerCase();
  var ft  = document.getElementById('mgKtsFilterTier')   ? document.getElementById('mgKtsFilterTier').value   : '';
  var fs  = document.getElementById('mgKtsFilterStatus') ? document.getElementById('mgKtsFilterStatus').value : '';
  var rows = _mgKtsData.filter(function(k){
    if(q && !k.name.toLowerCase().includes(q) && !k.cchn.toLowerCase().includes(q)) return false;
    if(ft && k.tier!==ft) return false;
    if(fs && k.status!==fs) return false;
    return true;
  });
  /* KPI */
  var total   = _mgKtsData.length;
  var active  = _mgKtsData.filter(function(k){return k.status==='active'&&k.activeProjects>0;}).length;
  var vip     = _mgKtsData.filter(function(k){return k.tier==='VIP Vàng';}).length;
  var avgR    = total ? (_mgKtsData.reduce(function(a,k){return a+k.rating;},0)/total).toFixed(1) : 0;
  var inactive= _mgKtsData.filter(function(k){return k.status!=='active';}).length;
  var revenue = _mgKtsData.reduce(function(a,k){return a+k.revenue;},0);
  document.getElementById('mgKtsV0').textContent = total;
  document.getElementById('mgKtsV1').textContent = active;
  document.getElementById('mgKtsV2').textContent = vip;
  document.getElementById('mgKtsV3').textContent = avgR+'★';
  document.getElementById('mgKtsV4').textContent = inactive;
  document.getElementById('mgKtsV5').textContent = _fmtM(revenue)+'đ';
  /* Table */
  var tbody = document.getElementById('mgKtsBody');
  if(!tbody) return;
  tbody.innerHTML = rows.length===0
    ? '<tr><td colspan="8" style="text-align:center;padding:36px;color:var(--dim)">Không có KTS phù hợp</td></tr>'
    : rows.map(function(k,i){
      var idx = _mgKtsData.indexOf(k);
      var rid = 'kts-row-'+idx;
      return '<tr id="'+rid+'" onclick="setActiveRow(\''+rid+'\',\'kts\','+idx+')" style="border-top:1px solid var(--border);border-left:3px solid transparent;transition:background .12s,border-color .12s;cursor:pointer"'
        +' onmouseover="if(_activeRowId!==\''+rid+'\')this.style.background=\'var(--raised)\'"'
        +' onmouseout="if(_activeRowId!==\''+rid+'\')this.style.background=\'\'">'

function mgToggleStatus(type, idx){

    toast((k.status==='active'?'🟢 Đã kích hoạt: ':'⚫ Đã tạm dừng: ')+k.name, 'info');

function mgDelete(type, idx){

/* ── STAT CARD ACCORDION ── */
var _activeStatCard = null;
function toggleStatCard(type){
  var accMap = {kts:'acc-kts', dn:'acc-dn', cn:'acc-cn'};
  var cardMap = {kts:'heroCardKts', dn:'heroCardDn', cn:'heroCardCn'};
  var accId = accMap[type];
  var cardId = cardMap[type];
  var acc = document.getElementById(accId);
  var card = document.getElementById(cardId);
  if(!acc || !card) return;

  var isOpen = _activeStatCard === type;

  // Close all
  ['kts','dn','cn'].forEach(function(t){
    var a = document.getElementById(accMap[t]);
    var c = document.getElementById(cardMap[t]);
    if(a){ a.style.display='none'; var b=a.querySelector('.acc-body'); if(b) b.classList.remove('open'); }
    if(c){ c.classList.remove('active'); }
  });

  if(!isOpen){
    _activeStatCard = type;
    acc.style.display = 'block';
    card.classList.add('active');
    setTimeout(function(){
      var body = acc.querySelector('.acc-body');
      if(body) body.classList.add('open');
    }, 10);
    // Scroll accordion into view
    setTimeout(function(){ acc.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 50);
  } else {
    _activeStatCard = null;
  }
}

function renderStats(){
  /* Update time */
  document.getElementById('statsUpdateTime').textContent = 'Cập nhật: ' + new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  /* KTS stats */

  var activeKts = STATS_KTS.filter(function(k){return k.status==='active' && k.activeProjects>0;}).length;
  var vipKts = STATS_KTS.filter(function(k){return k.tier==='VIP Vàng';}).length;
  var avgRating = (STATS_KTS.reduce(function(a,k){return a+k.rating;},0)/totalKts).toFixed(1);
  document.getElementById('stat-kts-total').textContent = totalKts;
  document.getElementById('stat-kts-active').textContent = activeKts;

  /* KTS tier bars */

  ];
  document.getElementById('dn-status-bars').innerHTML = dnStatuses.map(function(s){

  document.getElementById('dnV2').textContent=DN_PROJECTS.filter(p=>p.status==='sla_warn').length;

let _dnSK='',_dnSD=1;
function dnSort(k){_dnSK===k?_dnSD*=-1:(_dnSK=k,_dnSD=1);renderDNTable()}

function renderDNTable(reset){
  if(reset){['dnSearch','dnFilterStage','dnFilterStatus'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''})}
  updateDNKpi();
  const q=(document.getElementById('dnSearch')?.value||'').toLowerCase();
  const fs=document.getElementById('dnFilterStage')?.value||'';
  const fst=document.getElementById('dnFilterStatus')?.value||'';
  let rows=[...DN_PROJECTS].filter(p=>{
    if(q&&!p.id.toLowerCase().includes(q)&&!p.name.toLowerCase().includes(q)&&!p.cn.toLowerCase().includes(q)&&!p.kts.toLowerCase().includes(q))return false;
    if(fs&&p.stage!==fs)return false;
    if(fst&&p.status!==fst)return false;
    return true;
  });
  if(_dnSK){rows.sort((a,b)=>{const av={id:a.id,name:a.name,cn:a.cn,stage:a.stage,escrow:a.escrow,status:a.status}[_dnSK]||'';const bv={id:b.id,name:b.name,cn:b.cn,stage:b.stage,escrow:b.escrow,status:b.status}[_dnSK]||'';return typeof av==='number'?(av-bv)*_dnSD:av.localeCompare(bv)*_dnSD;})}
  const tbody=document.getElementById('dnTableBody');if(!tbody)return;
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:36px;color:var(--dim)">Không có dự án phù hợp</td></tr>`;return}
  tbody.innerHTML=rows.map(p=>{
    const sm=_DNSM[p.status]||_DNSM.on_track;
    const stgI=['C1','C2','C3','C4'].indexOf(p.stage);
    const stgColor=_STGC[stgI]||'var(--sub)';
    const mini=p.progress.map((v,i)=>`<div style="flex:${_STGP[i]};height:5px;background:${v>0?_STGC[i]:'var(--mute)'};opacity:${v>0?1:.3}"></div>`).join('');
    const docs=DN_DOCS_POOL[p.id]||[];
    const last=docs[docs.length-1];
    return `<tr style="border-bottom:1px solid rgba(31,36,56,.7);cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--raised)'" onmouseout="this.style.background=''">
      <td style="padding:10px 14px"><span style="font-family:var(--mono);font-size:11px;color:var(--blue)">${p.id}</span></td>
      <td style="padding:10px 14px"><div style="font-weight:600;color:var(--text1);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div><div style="font-size:10px;color:var(--dim)">${p.type}</div></td>
      <td style="padding:10px 14px;color:var(--text2);font-size:12px">${p.cn}</td>
      <td style="padding:10px 14px;color:var(--text2);font-size:11px">${p.kts}</td>
      <td style="padding:10px 14px"><span style="font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.04);color:${stgColor};border:1px solid ${stgColor}40">${p.stage}</span></td>
      <td style="padding:10px 14px"><div style="display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;width:88px">${mini}</div></td>
      <td style="padding:10px 14px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text1)">${_fmtM(p.escrow)}đ</td>
      <td style="padding:10px 14px"><span class="status-badge ${sm.cls}" style="font-size:10px">${sm.label}</span></td>
      <td style="padding:10px 14px">
        <div style="display:flex;align-items:center;gap:5px">
          <button onclick="openDocDrawer('${p.id}')" style="padding:4px 9px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blue);border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:4px">
            <i class="ph-duotone ph-folder-open" style="font-size:10px"></i> ${docs.length}
          </button>
          ${last?`<button onclick="event.stopPropagation();toast('📄 Preview: ${last.name}','info')" style="padding:4px 9px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:var(--green);border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans)">Mới nhất</button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

      <div style="padding:9px 14px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">

        <span style="font-size:12px;font-weight:700;color:var(--text1)">${stg}</span>
        <span style="font-size:10px;color:var(--dim)">${sn}</span>

        :sd.map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(31,36,56,.5)">

            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}</div>
              <div style="font-size:10px;color:var(--dim)">${d.kts} · ${d.date} · ${d.size}</div>
            </div>
            <span class="status-badge ${SCLS[d.status]||'p-gray'}" style="font-size:10px;flex-shrink:0">${SBADGE[d.status]||'—'}</span>
            <button onclick="openOtpModal('APPROVE_DOC','${d.id}')" style="padding:4px 9px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--green);border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans)">Duyệt</button>
          </div>`).join('')
      }
    </div>`;
  }).join('');
  document.getElementById('drawerBody').innerHTML=`
    <div style="background:rgba(108,99,255,.07);border:1px solid rgba(108,99,255,.18);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text2);display:flex;gap:8px;margin-bottom:4px">

      KTS upload tài liệu → Chủ đầu tư thấy ngay trên <b style="color:var(--accent2)">Cổng Client DN</b>. Tổ chức theo thư mục C1→C4.
    </div>
    ${foldersHTML}
    <div style="background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px"><i class="ph-duotone ph-upload-simple" style="color:var(--gold);margin-right:5px"></i>Upload tài liệu thủ công</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">

let _dSeq=100;
function addDocDN(projectId){
  const name=document.getElementById('newDocName')?.value.trim();
  const stage=document.getElementById('newDocStage')?.value||'C1';
  if(!name){toast('⚠️ Nhập tên tài liệu','warn');return}
  if(!DN_DOCS_POOL[projectId])DN_DOCS_POOL[projectId]=[];
  const d={id:'DOC'+(_dSeq++),name,type:'pdf',stage,kts:'Admin',date:new Date().toISOString().slice(0,10),size:'—',status:'pending'};
  DN_DOCS_POOL[projectId].unshift(d);
  toast('📁 Tài liệu đã thêm — Client DN sẽ thấy ngay!','ok');
  openDocDrawer(projectId);
  try{ALNRealtime.send({type:'DOC_UPLOADED',projectId,doc:d})}catch(e){}
}

function toast(msg,type){
  const cls={ok:'toast-ok',warn:'toast-warn',err:'toast-err',info:'toast-info'}[type]||'toast-info';
  const r=document.getElementById('toasts');
  while(r.children.length >= 4){ r.firstChild.remove(); }
  const el=document.createElement('div');
  el.className=`toast ${cls}`;el.textContent=msg;r.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300)},4000);
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */

<!-- ═══ ALN NOTIFY — chuông + rung + thông báo hệ thống ═══ -->
<script>
let _alnAudioCtx = null, _alnSoundOn = false;

function alnEnableNotify(){
  /* Gọi trong cử chỉ người dùng: mở khóa âm thanh + xin quyền thông báo */
  try {
    if(!_alnAudioCtx) _alnAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(_alnAudioCtx.state === 'suspended') _alnAudioCtx.resume();
    _alnSoundOn = true;
  } catch(e){}
  try {
    if('Notification' in window){
      if(Notification.permission === 'default'){
        Notification.requestPermission().then(function(p){
          if(p === 'granted' && window.alnInitPush) window.alnInitPush();
        });
      } else if(Notification.permission === 'granted' && window.alnInitPush){
        window.alnInitPush();
      }
    }
  } catch(e){}
}

function _alnBeep(){
  if(!_alnSoundOn || !_alnAudioCtx) return;
  try {
    var t0 = _alnAudioCtx.currentTime;
    var o=_alnAudioCtx.createOscillator(), g=_alnAudioCtx.createGain();
    o.connect(g); g.connect(_alnAudioCtx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.18,t0+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.35);
    o.start(t0); o.stop(t0+0.4);
    var o2=_alnAudioCtx.createOscillator(), g2=_alnAudioCtx.createGain();
    o2.connect(g2); g2.connect(_alnAudioCtx.destination);
    o2.type='sine'; o2.frequency.value=1175;
    g2.gain.setValueAtTime(0.0001,t0+0.12);
    g2.gain.exponentialRampToValueAtTime(0.16,t0+0.13);
    g2.gain.exponentialRampToValueAtTime(0.0001,t0+0.5);
    o2.start(t0+0.12); o2.stop(t0+0.55);
  } catch(e){}
}

let _alnTitleTimer = null;
const _alnTitleOrig = document.title;
function _alnFlashTitle(msg){
  clearInterval(_alnTitleTimer);
  var on = false;
  _alnTitleTimer = setInterval(function(){
    document.title = on ? _alnTitleOrig : ('💬 ' + msg);
    on = !on;
  }, 1200);
  var stop = function(){
    clearInterval(_alnTitleTimer);
    document.title = _alnTitleOrig;
    document.removeEventListener('visibilitychange', onVis);
  };
  var onVis = function(){ if(!document.hidden) stop(); };
  document.addEventListener('visibilitychange', onVis);
  setTimeout(stop, 30000);
}

function alnNotify(title, body){
  _alnBeep();
  try { if(navigator.vibrate) navigator.vibrate([180,90,180]); } catch(e){}
  try {
    if('Notification' in window && Notification.permission === 'granted' && document.hidden){
      var n = new Notification(title, { body: body||'', tag: 'aln-msg' });
      n.onclick = function(){ try{ window.focus(); }catch(e){} try{ n.close(); }catch(e){} };
    }
  } catch(e){}
  if(document.hidden) _alnFlashTitle(title);
}

/* Tự kích hoạt chuông + quyền thông báo ở lần chạm đầu tiên (không cần nút) */
(function(){
  function unlockOnce(){
    alnEnableNotify();
    document.removeEventListener('click', unlockOnce);
    document.removeEventListener('touchstart', unlockOnce);
  }
  document.addEventListener('click', unlockOnce);
  document.addEventListener('touchstart', unlockOnce);
})();
</script>

<!-- ═══ ALN FIREBASE AUTH GUARD — bảo vệ trang theo vai trò ═══ -->
<script type="module">
import { auth, db, onAuthStateChanged, signOut, doc, getDoc, setDoc, collection, addDoc, query, where, orderBy, limitToLast, onSnapshot, getMessaging, getToken, onFcmMessage, fcmSupported, ALN_VAPID_KEY } from "./firebase-config.js";

const REQUIRED_ROLE = "founder";


/* ══ FOUNDER: Load toàn bộ projects từ Firestore ══ */
function _adaptForFounder(id, d) {
  const prog = d.progress || {};
  return {
    id, name: d.name||'',
    cn: (d.cn&&d.cn.name)||'', kts: (d.kts&&d.kts.name)||'',
    dn: (d.dn&&d.dn.name)||'',
    type: 'Độc bản',
    stage: d.stage||'C1', status: d.status||'on_track',
    progress: [prog.C1||0, prog.C2||0, prog.C3||0, prog.C4||0],
    escrow: d.escrowBalance||0, total: d.totalFee||0,
    _raw: d
  };
}

function _startFounderListen() {
  const q = query(collection(db,'projects'), orderBy('updatedAt','desc'));
  onSnapshot(q, snap => {
    DN_PROJECTS = snap.docs.map(d => _adaptForFounder(d.id, d.data()));
    // Cập nhật stats nếu tab đang mở
    try { if(typeof renderStats==='function') renderStats(); } catch(e){}
    try { if(typeof renderDNTable==='function') renderDNTable(true); } catch(e){}
    console.log('[Founder] Load', DN_PROJECTS.length, 'dự án từ Firestore');
  }, err => console.error('[Founder] Lỗi:', err.code));
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    // Chưa đăng nhập → quay về trang login
    window.location.replace("login.html");
    return;
  }
  try {
    // Đọc hồ sơ với 3 lần thử (chống lỗi mạng/kho lưu trữ tạm thời)
    // Bypass Firestore cho founder (Rules chưa cho signedIn đọc users)
    let snap = null, lastErr = null;
    if (user.uid === 'h4kEguPEyMcwJwl89stc0Q6j2si2') {
      snap = { exists: () => true, data: () => ({
      role: 'founder',
      name: 'KTS. Trần Đại Long',
      username: 'founder.tranlong',
      email: 'tranlongkts.vn@gmail.com'
    }) };
    } else {
      for (let i = 0; i < 3; i++) {
        try { snap = await getDoc(doc(db, "users", user.uid)); lastErr = null; break; }
        catch (err) { lastErr = err; await new Promise(r => setTimeout(r, 800)); }
      }
      if (lastErr) throw lastErr;
    }
    const profile = (snap && snap.exists()) ? snap.data() : null;

    if (!profile) {
      await signOut(auth);
      try { localStorage.removeItem("aln_user"); sessionStorage.removeItem("aln_user"); } catch(e){}
      window.location.replace("login.html");
      return;
    }
    if (profile.role !== REQUIRED_ROLE) {
      // Sai vai trò → chuyển về đúng trang của vai trò đó (KHÔNG đăng xuất)
      const PAGE_BY_ROLE = { founder:"founder_panel.html", kts:"kts_dashboard.html", dn:"client_DN.html", cn:"client_CN.html" };
      window.location.replace(PAGE_BY_ROLE[profile.role] || "login.html");
      return;
    }

    // Làm mới thông tin hiển thị từ Firestore
    const ud = JSON.stringify({
      name:   profile.name || "",
      userId: profile.username || "",
      role:   profile.role,
      badge:  profile.badge || "",
      uid:    user.uid,
    });
    try { localStorage.setItem("aln_user", ud); } catch(e){}
    try { sessionStorage.setItem("aln_user", ud); } catch(e){}

    // Xác thực OK → mở màn che
    const veil = document.getElementById("alnAuthVeil");
    if (veil) veil.remove();

    // Kích hoạt kênh realtime Firestore cho ALNRealtime
    if (window.__ALN_RT_RESOLVE) {
      window.__ALN_RT_RESOLVE({ db, collection, addDoc, query, orderBy, limitToLast, onSnapshot });
    }

    // ── WEB PUSH (FCM): đăng ký token tự động khi đã có quyền thông báo ──
    window.__ALN_UID = user.uid;
    window.alnInitPush = async function(){
      try {
        if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
        if (Notification.permission !== 'granted') return;
        if (!ALN_VAPID_KEY || ALN_VAPID_KEY.indexOf('DAN_KHOA') === 0) { console.warn('[ALN Push] Chưa dán khóa VAPID'); return; }
        const ok = await fcmSupported().catch(() => false);
        if (!ok) return;
        await navigator.serviceWorker.register('./firebase-messaging-sw.js');
        const reg = await navigator.serviceWorker.ready; // chờ Service Worker ACTIVE rồi mới xin token
        const messaging = getMessaging();
        const tok = await getToken(messaging, { vapidKey: ALN_VAPID_KEY, serviceWorkerRegistration: reg });
        if (tok) {
          await setDoc(doc(db, 'fcmTokens', tok), {
            token: tok, uid: user.uid, role: profile.role,
            ua: (navigator.userAgent || '').slice(0, 100), ts: Date.now()
          });
          console.log('[ALN Push] Token đã đăng ký');
        }
        // Tin đến khi trang đang mở -> chuông tại chỗ
        onFcmMessage(messaging, (p) => {
          const dd = (p && p.data) || {};
          try { alnNotify(dd.title || 'ALN', dd.body || ''); } catch(e){}
        });
      } catch(e){ console.warn('[ALN Push]', e); }
    };
    window.alnInitPush();

    // ── CÔNG TẮC GIÁM SÁT PUSH: founder nhận thêm tin chat/pin về thiết bị ──
    try {
      const pill = document.createElement('button');
      pill.id = 'alnMonitorPill';
      pill.style.cssText = 'position:fixed;bottom:20px;left:20px;z-index:498;background:#111114;border:1.5px solid rgba(240,235,224,.2);border-radius:99px;padding:9px 16px;font-size:11px;font-weight:700;color:rgba(240,235,224,.45);cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.45);font-family:inherit';
      pill.textContent = '🔔 Giám sát push: ...';
      pill.title = 'BẬT: mọi tin chat/pin cũng đẩy về thiết bị founder. TẮT: founder chỉ nhận dispute.';
      document.body.appendChild(pill);
      const ref = doc(db, 'settings', 'push');
      let mon = false;
      try { const s = await getDoc(ref); mon = !!(s.exists() && s.data().founderMonitor); } catch(e){}
      const paint = () => {
        pill.textContent = '🔔 Giám sát push: ' + (mon ? 'BẬT' : 'TẮT');
        pill.style.color = mon ? '#C9A84C' : 'rgba(240,235,224,.45)';
        pill.style.borderColor = mon ? 'rgba(201,168,76,.5)' : 'rgba(240,235,224,.2)';
      };
      paint();
      pill.onclick = async () => {
        mon = !mon; paint();
        try { await setDoc(ref, { founderMonitor: mon, ts: Date.now() }, { merge: true }); }
        catch(e){ mon = !mon; paint(); try{ toast('Không lưu được cài đặt — kiểm tra mạng/rules', 'err'); }catch(_){} }
      };
    } catch(e){}
  } catch(e) {
    console.error("[ALN Guard]", e);
    // Không kẹt màn hình xác thực: cho người dùng bấm thử lại
    const veil = document.getElementById("alnAuthVeil");
    if (veil) veil.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;font-family:sans-serif">'
      + '<div style="color:rgba(240,235,224,.85);font-size:14px;text-align:center;padding:0 24px">Không kiểm tra được phiên đăng nhập.<br>Vui lòng kiểm tra mạng và thử lại.</div>'
      + '<button onclick="location.reload()" style="background:linear-gradient(135deg,#C9A84C,#d4b86a);border:none;border-radius:8px;padding:11px 26px;font-weight:700;font-size:13px;cursor:pointer;color:#000">Thử lại</button>'
      + '<button onclick="window.location.replace(\'login.html\')" style="background:none;border:1px solid rgba(240,235,224,.25);border-radius:8px;padding:9px 22px;font-size:12px;cursor:pointer;color:rgba(240,235,224,.7)">Về trang đăng nhập</button>'
      + '</div>';
  }
});

/* Đăng xuất — gọi alnLogout() từ bất kỳ đâu (nút, console...) */
window.alnLogout = async function(){
  try { await signOut(auth); } catch(e){}
  try { localStorage.removeItem("aln_user"); sessionStorage.removeItem("aln_user"); } catch(e){}
  window.location.replace("login.html");
};
</script>
