<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — MyMy CSKH</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/duotone/style.css"/>
<style>
:root{
  --ink:#f0f4f8;--ink2:#ffffff;--ink3:#f8fafc;--ink4:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#475569;--sub:#94a3b8;
  --accent:#d4a017;--gold:#d4a017;
  --green:#16a34a;
  --r:10px;--r-sm:7px;
  --sans:'DM Sans',sans-serif;--syne:'Syne',sans-serif;--serif:'Cormorant Garamond',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--ink);color:var(--text);font-size:13px;padding:24px 16px 60px}
.wrap{max-width:640px;margin:0 auto}

.hello{text-align:center;margin-bottom:20px}
.eyebrow{font-family:var(--syne);font-size:9.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);display:inline-flex;align-items:center;gap:7px;margin-bottom:10px}
.eyebrow::before,.eyebrow::after{content:'';width:22px;height:1px;background:rgba(212,160,23,.4)}
.hello h1{font-family:var(--serif);font-size:25px;font-weight:600;font-style:italic;line-height:1.25}
.hello p{font-size:12px;color:var(--sub);max-width:420px;margin:8px auto 0;line-height:1.7}

.chat-box{background:var(--ink2);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 28px rgba(15,23,42,.07)}

/* Header */
.chat-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(212,160,23,.07),transparent)}
.av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#c8940e,#e8c44a);display:flex;align-items:center;justify-content:center;font-family:var(--syne);font-weight:800;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 2px 12px rgba(212,160,23,.3);position:relative}
.av .dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2.5px solid #fff}
.hd .nm{font-family:var(--syne);font-weight:800;font-size:13.5px;color:var(--text);display:flex;align-items:center;gap:7px}
.hd .badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.28);padding:2px 8px;border-radius:99px}
.hd .role{font-size:11px;color:var(--sub);margin-top:2px}

/* Body chat */
.chat-body{padding:18px;display:flex;flex-direction:column;gap:13px;max-height:480px;overflow-y:auto;scroll-behavior:smooth}
.chat-body::-webkit-scrollbar{width:3px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(212,160,23,.2);border-radius:99px}

/* Tin MyMy */
.mm{display:flex;gap:9px;align-items:flex-start}
.mm .m-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#c8940e,#e8c44a);display:flex;align-items:center;justify-content:center;font-family:var(--syne);font-weight:800;font-size:10px;color:#fff;flex-shrink:0;margin-top:2px}
.mm .b{background:var(--ink3);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:11px 14px;font-size:12.5px;color:var(--text2);line-height:1.65;max-width:85%}
.mm .b b{color:var(--text)}
.mm .b em{color:var(--accent);font-style:normal}

/* Tin user */
.uu{display:flex;justify-content:flex-end}
.uu .b{background:linear-gradient(135deg,#c8940e,#d4a017);color:#fff;border-radius:14px 4px 14px 14px;padding:11px 14px;font-size:12.5px;max-width:78%;line-height:1.5}

/* Chips */
.chip-row{display:flex;flex-wrap:wrap;gap:7px;padding:4px 18px 10px}
.chip{font-size:12px;font-weight:600;color:var(--accent);background:rgba(212,160,23,.07);border:1.5px solid rgba(212,160,23,.26);border-radius:99px;padding:7px 15px;cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{background:rgba(212,160,23,.15)}
.chip.picked{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.multi.picked{background:rgba(212,160,23,.14);color:#7a5200;border-color:var(--accent)}
.chip.ok-btn{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Input */
.chat-foot{border-top:1px solid var(--border);background:var(--ink3)}
.chat-input{display:flex;gap:9px;align-items:center;padding:12px 16px}
.chat-input input{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:99px;padding:10px 17px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s}
.chat-input input:focus{border-color:var(--accent)}
.chat-input input::placeholder{color:var(--sub)}
.send{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#bf8f1a,#d4a017);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:0 2px 8px rgba(212,160,23,.28)}
.send:hover{transform:scale(1.07)}
.chat-note{text-align:center;font-size:10.5px;color:var(--sub);padding:6px 16px 12px;display:flex;align-items:center;justify-content:center;gap:5px}
.chat-note i{color:var(--accent)}

/* Typing */
.typing-wrap{display:flex;gap:9px;align-items:flex-start}
.typing-wrap .m-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#c8940e,#e8c44a);display:flex;align-items:center;justify-content:center;font-family:var(--syne);font-weight:800;font-size:10px;color:#fff;flex-shrink:0;margin-top:2px}
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--ink3);border:1px solid var(--border);border-radius:4px 14px 14px 14px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--sub);animation:tp .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,80%,100%{transform:scale(.75);opacity:.35}40%{transform:scale(1);opacity:1}}

/* Summary card */
.sum-card{margin-top:4px;background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.22);border-radius:12px;padding:13px 15px;font-size:12px;line-height:1.85;color:var(--text2)}
.sum-card .row{display:flex;gap:8px;margin-bottom:2px}
.sum-card .lbl{color:var(--accent);font-weight:700;flex-shrink:0;min-width:26px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hello">
    <div class="eyebrow">Trong lúc chờ kết nối KTS</div>
    <h1>MyMy đang ở đây cùng bạn</h1>
    <p>Hãy cùng nhau phác thảo ý tưởng — MyMy sẽ lắng nghe và ghi lại mọi điều bạn mong muốn để đội KTS hiểu bạn thật sự ngay từ buổi đầu.</p>
  </div>

  <div class="chat-box">
    <div class="chat-head">
      <div class="av">My<span class="dot"></span></div>
      <div class="hd">
        <div class="nm">MyMy <span class="badge">Đang trực tuyến</span></div>
        <div class="role">Tư vấn Thiết kế & Xây dựng · ALN</div>
      </div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chip-row" id="chipRow" style="display:none"></div>
    <div class="chat-foot">
      <div class="chat-input">
        <input id="chatIn" type="text" placeholder="Nhắn cho MyMy…" autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send" onclick="sendMsg()"><i class="ph-duotone ph-paper-plane-right"></i></button>
      </div>
      <div class="chat-note"><i class="ph-duotone ph-lock-simple"></i> Chỉ đội KTS ALN đọc được thông tin này</div>
    </div>
  </div>
</div>

<script>
var step = 0;
var collected = {};
var multiSel = [];
var body = document.getElementById('chatBody');
var chipRow = document.getElementById('chipRow');
var chatIn = document.getElementById('chatIn');

// ══ LUỒNG HỘI THOẠI ══
var flow = [
  // 0 — Chào
  {
    from:'mm',
    text:'Chào bạn! 👋 Mình là <b>MyMy</b>, tư vấn viên của đội Thiết kế & Xây dựng ALN. Trong lúc đội KTS xem xét hồ sơ, mình sẽ ngồi đây trò chuyện cùng bạn một chút nhé.',
    delay:400
  },
  // 1
  {
    from:'mm',
    text:'Mình rất muốn nghe về <b>ngôi nhà bạn đang mơ tới</b>. Bắt đầu thôi — bạn thấy mình hợp với phong cách nào nhất?',
    chips:['Hiện đại · Tối giản','Tân cổ điển','Cổ điển · Sang trọng','Nhiệt đới · Gần gũi thiên nhiên','Indochine · Đông Dương','Chưa rõ, nhờ KTS gợi ý'],
    key:'phong_cach', delay:900
  },
  // 2 — follow-up phong cách
  {
    from:'mm',
    textFn: function(){ return 'Thú vị! Với phong cách đó, bạn thường bị thu hút bởi điều gì — <b>ánh sáng tự nhiên</b>, <b>vật liệu thô mộc</b>, hay <b>sự ngăn nắp gọn gàng</b>? Cứ kể tự do, không cần đúng hay sai.'; },
    key:'cam_giac', freeText:true, delay:700
  },
  // 3 — Gia đình
  {
    from:'mm',
    text:'Mình hỏi thêm một chút để hiểu rõ hơn nhé — <b>gia đình bạn gồm những ai</b> sẽ sống trong ngôi nhà này?',
    chips:['Vợ chồng + con nhỏ','Vợ chồng + con lớn / học đại học','Gia đình 3 thế hệ (có ông bà)','Chỉ 2 vợ chồng','Sống một mình','Kinh doanh kết hợp ở'],
    key:'gia_dinh', delay:700
  },
  // 4 — Thói quen sinh hoạt
  {
    from:'mm',
    text:'Hay đó! Mỗi gia đình có nhịp sống riêng. Bạn hay <b>tụ họp ở đâu nhiều nhất</b> trong nhà — phòng khách, bếp, hay nơi nào khác?',
    chips:['Phòng khách — xem phim, nói chuyện','Bếp — nấu ăn là niềm vui','Sân vườn / Ban công','Phòng riêng — ai lo việc nấy','Tuỳ lúc, không cố định'],
    key:'noi_tu_hop', delay:700
  },
  // 5 — Công năng đặc biệt
  {
    from:'mm',
    text:'Ngoài các phòng cơ bản, có <b>không gian nào bạn đặc biệt muốn có</b> không? Chọn những gì đang trong đầu bạn nhé (chọn nhiều)',
    chips:['Phòng thờ rộng rãi','Garage / sân để xe','Bếp mở liền phòng ăn','Phòng làm việc tại nhà','Phòng cho ông bà / người giúp việc','Hồ bơi / sân vườn','Sân thượng thoáng','Phòng sinh hoạt chung / rạp phim mini','Kho chứa đồ rộng'],
    key:'cong_nang', multi:true, delay:700
  },
  // 6 — Điều không thích
  {
    from:'mm',
    text:'Bạn đang ở đâu trước khi xây nhà mới? Và có <b>điều gì bạn không thích ở chỗ ở hiện tại</b> mà nhất định muốn tránh trong ngôi nhà mới không?',
    key:'khong_thich', freeText:true, delay:700
  },
  // 7 — Cảm xúc & trải nghiệm sống
  {
    from:'mm',
    text:'Câu này hơi "triết học" một chút 😄 — Khi bước vào ngôi nhà của mình, bạn muốn <b>cảm thấy điều gì</b>?',
    chips:['Bình yên · Thư giãn hoàn toàn','Tự hào · Sang trọng','Ấm áp · Gắn kết gia đình','Sáng tạo · Năng động','Gần gũi thiên nhiên · Thoáng mát','Riêng tư · Yên tĩnh'],
    key:'cam_xuc', delay:800
  },
  // 8 — Phong thuỷ / yếu tố tâm linh
  {
    from:'mm',
    text:'Bạn có <b>chú trọng phong thuỷ</b> hay các yếu tố tâm linh trong thiết kế không? Nếu có, bạn muốn ưu tiên điều gì?',
    chips:['Có — hướng nhà, hướng bếp quan trọng','Có — cần tư vấn phong thuỷ bài bản','Bình thường — chỉ cần hợp lý','Không quan tâm'],
    key:'phong_thuy', delay:700
  },
  // 9 — Ngân sách
  {
    from:'mm',
    text:'Mình hỏi thêm để đội KTS tư vấn thực tế nhất — bạn dự kiến <b>mức đầu tư</b> cho công trình này là khoảng bao nhiêu?',
    chips:['Dưới 1 tỷ','1 – 2 tỷ','2 – 4 tỷ','4 – 7 tỷ','Trên 7 tỷ','Chưa xác định — cần tư vấn'],
    key:'ngan_sach', delay:700
  },
  // 10 — Thời gian
  {
    from:'mm',
    text:'Bạn đang nhắm <b>thời điểm nào</b> để bắt đầu khởi công?',
    chips:['Càng sớm càng tốt (1–3 tháng)','3 – 6 tháng nữa','6 tháng – 1 năm','Hơn 1 năm nữa','Chưa xác định'],
    key:'thoi_gian', delay:600
  },
  // 11 — Lo lắng / băn khoăn
  {
    from:'mm',
    text:'Gần xong rồi! Mình muốn hỏi thêm — khi nghĩ đến việc xây nhà, <b>điều bạn lo lắng hoặc băn khoăn nhất</b> là gì?',
    chips:['Chi phí phát sinh ngoài dự toán','Chất lượng thi công không đảm bảo','Thời gian thi công kéo dài','Khó truyền đạt ý tưởng cho KTS','Chọn sai vật liệu / phong cách','Chưa lo lắng gì cả'],
    key:'lo_lang', delay:700
  },
  // 12 — Lời nhắn cuối
  {
    from:'mm',
    text:'Còn điều gì bạn muốn <b>nói thêm với đội KTS</b> không? Bất cứ điều gì — vật liệu yêu thích, câu chuyện đằng sau ngôi nhà, hay điều bạn ấp ủ bấy lâu… Cứ kể hết nhé 🙏',
    key:'nhan_gui', freeText:true, delay:700
  },
  // 13 — Kết
  {
    from:'mm', summary:true, delay:600
  }
];

function scrollDown(){ body.scrollTop = body.scrollHeight; }

function addMM(html, cb){
  // typing
  var tw = document.createElement('div');
  tw.className = 'typing-wrap';
  tw.innerHTML = '<div class="m-av">My</div><div class="typing"><span></span><span></span><span></span></div>';
  body.appendChild(tw); scrollDown();
  var delay = Math.min(1200, 600 + html.replace(/<[^>]+>/g,'').length * 18);
  setTimeout(function(){
    body.removeChild(tw);
    var w = document.createElement('div'); w.className = 'mm';
    w.innerHTML = '<div class="m-av">My</div><div class="b">'+html+'</div>';
    body.appendChild(w); scrollDown();
    if(cb) cb();
  }, delay);
}

function addUser(html, cb){
  var w = document.createElement('div'); w.className = 'uu';
  w.innerHTML = '<div class="b">'+html+'</div>';
  body.appendChild(w); scrollDown();
  if(cb) cb();
}

function showChips(chips, multi){
  chipRow.style.display = 'flex';
  chipRow.innerHTML = '';
  multiSel = [];
  chips.forEach(function(c){
    var el = document.createElement('span');
    el.className = 'chip' + (multi ? ' multi' : '');
    el.textContent = c;
    el.onclick = function(){
      if(!multi){
        chips.forEach(function(){ }); // noop
        disableChips();
        handleAnswer(c);
      } else {
        el.classList.toggle('picked');
        var idx = multiSel.indexOf(c);
        if(idx >= 0) multiSel.splice(idx,1); else multiSel.push(c);
      }
    };
    chipRow.appendChild(el);
  });
  if(multi){
    var ok = document.createElement('span');
    ok.className = 'chip ok-btn';
    ok.innerHTML = '<i class="ph-duotone ph-check" style="margin-right:5px;vertical-align:-1px"></i>Xong';
    ok.onclick = function(){
      if(!multiSel.length) multiSel = ['Bỏ qua'];
      disableChips();
      handleAnswer(multiSel.join(' · '));
    };
    chipRow.appendChild(ok);
  }
}

function disableChips(){
  chipRow.querySelectorAll('.chip').forEach(function(c){ c.style.pointerEvents='none'; c.style.opacity='.5'; });
}
function hideChips(){ chipRow.style.display='none'; chipRow.innerHTML=''; }

function handleAnswer(val){
  hideChips();
  var s = flow[step];
  if(s && s.key) collected[s.key] = val;
  addUser(val, function(){ step++; runStep(); });
}

function sendMsg(){
  var val = (chatIn.value||'').trim(); if(!val) return;
  chatIn.value = '';
  hideChips();
  var s = flow[step];
  if(s && s.key) collected[s.key] = val;
  addUser(val, function(){ step++; runStep(); });
}

function runStep(){
  if(step >= flow.length) return;
  var s = flow[step];
  setTimeout(function(){
    var txt = s.textFn ? s.textFn() : (s.text||'');

    if(s.summary){
      var lines = [
        {e:'🎨',l:'Phong cách',k:'phong_cach'},
        {e:'✨',l:'Cảm giác muốn có',k:'cam_giac'},
        {e:'👨‍👩‍👧',l:'Gia đình',k:'gia_dinh'},
        {e:'🏠',l:'Nơi tụ họp',k:'noi_tu_hop'},
        {e:'🔧',l:'Công năng cần có',k:'cong_nang'},
        {e:'❌',l:'Muốn tránh',k:'khong_thich'},
        {e:'💛',l:'Cảm xúc khi về nhà',k:'cam_xuc'},
        {e:'🧭',l:'Phong thuỷ',k:'phong_thuy'},
        {e:'💰',l:'Ngân sách',k:'ngan_sach'},
        {e:'📅',l:'Thời gian',k:'thoi_gian'},
        {e:'😟',l:'Băn khoăn',k:'lo_lang'},
        {e:'📝',l:'Nhắn gửi KTS',k:'nhan_gui'},
      ];
      var rows = lines.filter(function(x){ return collected[x.k]; })
        .map(function(x){ return '<div class="row"><span class="lbl">'+x.e+'</span><span><b>'+x.l+':</b> '+collected[x.k]+'</span></div>'; }).join('');
      var card = rows ? '<div class="sum-card">'+rows+'</div>' : '';
      addMM('Cảm ơn bạn rất nhiều vì đã chia sẻ thật lòng 🙏 Mình đã ghi lại đầy đủ tất cả. Đội KTS ALN sẽ đọc kỹ từng điều bạn kể và liên hệ bạn sớm nhất có thể — họ sẽ hiểu bạn thật sự trước khi ngồi vào bàn vẽ.'+card);
      chatIn.disabled = true;
      chatIn.placeholder = 'MyMy đã ghi nhận đủ ✓';
      document.querySelector('.send').disabled = true;
      return;
    }

    addMM(txt, function(){
      if(s.chips) showChips(s.chips, s.multi||false);
      else if(s.freeText) chatIn.focus();
    });
  }, s.delay||500);
}

// Khởi động 2 tin đầu
setTimeout(function(){
  addMM(flow[0].text, function(){ step=1; runStep(); });
}, 500);
</script>
</body>
</html>
