<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Xuất icon ALN</title>
<style>
  body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0a0a0a;color:#fff;gap:20px}
  canvas{border-radius:20px}
  button{padding:12px 28px;font-size:15px;background:#C9A84C;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  button:hover{background:#EDD050}
  #msg{color:#9A7A3A;font-size:14px}
</style>
</head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<div id="msg">Đang render icon...</div>
<div style="display:flex;gap:12px">
  <button onclick="dl(192)">Tải icon-192.png</button>
  <button onclick="dl(512)">Tải icon-512.png</button>
</div>

<script>
var SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
<defs>
<linearGradient id="xB" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"   stop-color="#FFF3A8"/>
  <stop offset="25%"  stop-color="#EDD050"/>
  <stop offset="50%"  stop-color="#C9A84C"/>
  <stop offset="75%"  stop-color="#F5D860"/>
  <stop offset="100%" stop-color="#8A6218"/>
</linearGradient>
<linearGradient id="xL" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%"   stop-color="#FFFAD0"/>
  <stop offset="28%"  stop-color="#F2D24E"/>
  <stop offset="62%"  stop-color="#C9A84C"/>
  <stop offset="100%" stop-color="#7A5418"/>
</linearGradient>
<linearGradient id="xN" x1="22" y1="0" x2="110" y2="0" gradientUnits="userSpaceOnUse">
  <stop offset="0%"   stop-color="#7A5418"/>
  <stop offset="50%"  stop-color="#F2D24E"/>
  <stop offset="100%" stop-color="#7A5418"/>
</linearGradient>
</defs>
<rect width="120" height="120" rx="24" fill="#122644"/>
<rect x="1.5" y="1.5" width="117" height="117" rx="22.5" fill="none" stroke="url(#xB)" stroke-width="2"/>
<text transform="rotate(-90,14,34)" x="14" y="34" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" letter-spacing="2">STUDIO</text>
<text x="64" y="69" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="700" fill="url(#xL)">A</text>
<text x="22" y="82" text-anchor="start" font-family="Georgia,serif" font-size="18" font-weight="400" fill="url(#xL)">L</text>
<text x="110" y="82" text-anchor="end" font-family="Georgia,serif" font-size="18" font-weight="400" fill="url(#xL)">N</text>
<line x1="22" y1="88" x2="110" y2="88" stroke="url(#xN)" stroke-width="0.7"/>
<text x="66" y="103" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white" fill-opacity="0.85" letter-spacing="3">APP LÀM NHÀ</text>
</svg>`;

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var img = new Image();
img.onload = function() {
  ctx.drawImage(img, 0, 0, 512, 512);
  document.getElementById('msg').textContent = 'Icon đã render ✓ — nhấn nút để tải PNG';
};
img.onerror = function() {
  document.getElementById('msg').textContent = '⚠ Lỗi render — thử mở bằng Chrome';
};
img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(SVG);

function dl(size) {
  var tmp = document.createElement('canvas');
  tmp.width = size; tmp.height = size;
  tmp.getContext('2d').drawImage(canvas, 0, 0, size, size);
  var a = document.createElement('a');
  a.download = 'icon-' + size + '.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
  document.getElementById('msg').textContent = '✓ icon-' + size + '.png đã tải — đặt vào thư mục ALN/';
}
</script>
</body>
</html>
