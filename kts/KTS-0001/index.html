  html,body{margin:0;height:100%;background:#080c14;color:#f0e6cc;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
  .box{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:16px}
  .ring{width:38px;height:38px;border-radius:50%;border:3px solid rgba(201,168,76,.25);border-top-color:#C9A84C;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

<script>
// Link định danh KTS: ghi nhận công người giới thiệu (localStorage) rồi vào thẳng diễn đàn.
// Bot mạng xã hội không chạy JS → chỉ đọc thẻ OG ở trên để hiện preview đẹp.
(function(){
  try {
    var segs = location.pathname.split('/').filter(Boolean);
    var code = '';
    for(var i = segs.length - 1; i >= 0; i--){ if(/^KTS-\d+$/i.test(segs[i])){ code = segs[i].toUpperCase(); break; } }
    if(!code){ var q = new URLSearchParams(location.search).get('code'); if(q) code = q.trim().toUpperCase(); }
    if(/^KTS-\d+$/.test(code)){
      // Lưu công người giới thiệu (60 ngày) — sẽ gắn vào hồ sơ khi khách đăng ký
      localStorage.setItem('aln_kts_ref', JSON.stringify({ code: code, ts: Date.now() }));
    }
  } catch(e){}
  // Vào thẳng diễn đàn
  location.replace('../../forum.html');
})();
</script>
