<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ALN — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --ink:#08080a;--ink2:#111114;--ink3:#18181c;--ink4:#222228;
  --border:rgba(201,168,76,0.16);--border2:rgba(201,168,76,0.28);
  --text:#F0EBE0;--text2:rgba(240,235,224,0.7);--sub:rgba(240,235,224,0.44);--muted:rgba(240,235,224,0.28);
  --gold:#C9A84C;--gold2:#d4b86a;--gold-bg:rgba(201,168,76,.08);
  --green:#22c97a;--red:#ef4444;--amber:#ffaa33;
  --r:12px;--r-sm:8px;
  --sans:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;--syne:'Syne',sans-serif;--serif:'Cormorant Garamond',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;height:100%}
body{font-family:var(--sans);background:var(--ink);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── BG GRID ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.07) 0%,transparent 60%);
  pointer-events:none;z-index:0
}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:24px 16px}

/* ── HEADER ── */
.brand{text-align:center;margin-bottom:36px}
.brand-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px}
.brand-box{background:var(--gold-bg);border:1.5px solid rgba(201,168,76,.3);border-radius:10px;padding:7px 14px;font-family:var(--syne);font-size:15px;font-weight:800;letter-spacing:.08em;color:var(--gold)}
.brand-tag{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--sub);letter-spacing:.06em;text-transform:uppercase}
.brand-title{font-family:var(--serif);font-size:28px;font-weight:300;font-style:italic;color:var(--text);line-height:1.2;margin-bottom:6px}
.brand-sub{font-size:12px;color:var(--sub)}

/* ── ROLE SELECTOR ── */
.role-tabs{display:flex;gap:6px;background:var(--ink3);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:0;width:100%;max-width:420px}
.role-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;border-radius:9px;cursor:pointer;transition:all .18s;border:1.5px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.role-tab:hover{background:rgba(201,168,76,.06)}
.role-tab.active{background:var(--gold-bg);border-color:rgba(201,168,76,.3)}
.role-tab .rt-icon{font-size:18px;line-height:1}
.role-tab .rt-label{font-size:10px;font-weight:700;color:var(--sub);letter-spacing:.04em;text-align:center;transition:color .18s}
.role-tab.active .rt-label{color:var(--gold)}
.role-tab .rt-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:background .18s}
.role-tab.active .rt-dot{background:var(--gold)}

/* ── LOGIN CARD ── */
.login-card{width:100%;max-width:420px;background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.card-top{padding:20px 24px 0}
.role-label-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.role-icon-big{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.role-title{font-family:var(--serif);font-size:17px;font-weight:600;font-style:italic;color:var(--text)}
.role-desc{font-size:11px;color:var(--sub)}

/* ── FORM ── */
.form-body{padding:0 24px 24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.field-wrap{position:relative}
.field-wrap .fi{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.field input{width:100%;background:var(--ink3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px 10px 34px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
.field input:focus{border-color:rgba(201,168,76,.45);background:var(--ink4)}
.field input::placeholder{color:var(--muted)}
.field-pw .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;transition:color .15s}
.field-pw .eye:hover{color:var(--text2)}

/* ── DEMO ACCOUNTS ── */
.demo-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.demo-btn{flex:1;min-width:0;background:var(--ink3);border:1px solid var(--border);border-radius:7px;padding:7px 8px;cursor:pointer;transition:all .15s;text-align:left}
.demo-btn:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06)}
.demo-btn .db-name{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.demo-btn .db-hint{font-size:9px;color:var(--muted);font-family:var(--mono)}
.demo-label{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}

/* ── BTN ── */
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#C9A84C,#d4b86a);border:none;border-radius:var(--r-sm);font-family:var(--syne);font-size:13px;font-weight:700;letter-spacing:.06em;color:#000;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:4px}
.btn-login:hover{opacity:.9}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}

/* ── ERROR / SUCCESS ── */
.msg-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--r-sm);padding:9px 12px;font-size:12px;color:var(--red);display:none;align-items:center;gap:8px;margin-bottom:12px}
.msg-error.show{display:flex}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:16px 0;position:relative}
.divider span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--ink2);padding:0 10px;font-size:10px;color:var(--muted);white-space:nowrap}

/* ── REDIRECT OVERLAY ── */
.redirect-overlay{position:fixed;inset:0;background:var(--ink);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.redirect-overlay.show{display:flex}
.redirect-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.redirect-msg{font-family:var(--serif);font-size:20px;font-style:italic;color:var(--text2)}
.redirect-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ── FOOTER ── */
.login-footer{margin-top:20px;text-align:center;font-size:11px;color:var(--muted)}
.login-footer a{color:var(--sub);text-decoration:none}

/* ── MOBILE ── */
@media(max-width:460px){
  .brand-title{font-size:22px}
  .form-body,.card-top{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>

<!-- REDIRECT OVERLAY -->
<div class="redirect-overlay" id="redirectOverlay">
  <div class="redirect-spinner"></div>
  <div class="redirect-msg" id="redirectMsg">Đang vào trang...</div>
  <div class="redirect-sub" id="redirectSub">Xin chờ giây lát</div>
</div>

<div class="page">

  <!-- BRAND -->
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-box">ALN</div>
    </div>
    <div class="brand-title">Cổng Theo dõi Công trình</div>
    <div class="brand-sub">Đăng nhập để vào trang quản lý của bạn</div>
  </div>

  <!-- ROLE SELECTOR -->
  <div class="role-tabs" id="roleTabs">
    <div class="role-tab active" data-role="kts" onclick="switchRole('kts')">
      <div class="rt-icon">🎨</div>
      <div class="rt-label">Kiến trúc sư</div>
      <div class="rt-dot"></div>
    </div>
    <div class="role-tab" data-role="dn" onclick="switchRole('dn')">
      <div class="rt-icon">🏢</div>
      <div class="rt-label">Doanh nghiệp</div>
      <div class="rt-dot"></div>
    </div>
    <div class="role-tab" data-role="cn" onclick="switchRole('cn')">
      <div class="rt-icon">👤</div>
      <div class="rt-label">Chủ nhà</div>
      <div class="rt-dot"></div>
    </div>
  </div>

  <!-- LOGIN CARD -->
  <div class="login-card" style="margin-top:8px">
    <div class="card-top" id="cardTop">
      <!-- Role header injected by JS -->
    </div>
    <div class="form-body">

      <!-- Error -->
      <div class="msg-error" id="msgError">
        <i class="fa fa-circle-exclamation"></i>
        <span id="msgErrorTxt">Tên đăng nhập hoặc mật khẩu không đúng.</span>
      </div>

      <!-- Demo accounts -->
      <div>
        <div class="demo-label"><i class="fa fa-bolt" style="color:var(--gold);font-size:9px"></i> Tài khoản demo — nhấn để điền nhanh</div>
        <div class="demo-row" id="demoRow"><!-- injected --></div>
      </div>

      <div class="divider"><span>hoặc nhập thủ công</span></div>

      <!-- Username -->
      <div class="field">
        <label>Tên đăng nhập</label>
        <div class="field-wrap">
          <i class="fi fa fa-user"></i>
          <input type="text" id="inputUser" placeholder="username" autocomplete="username" autocapitalize="none" spellcheck="false">
        </div>
      </div>

      <!-- Password -->
      <div class="field field-pw">
        <label>Mật khẩu</label>
        <div class="field-wrap">
          <i class="fi fa fa-lock"></i>
          <input type="password" id="inputPw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
          <button class="eye" onclick="togglePw()" id="eyeBtn" tabindex="-1"><i class="fa fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="doLogin()">
        <i class="fa fa-right-to-bracket" style="margin-right:6px"></i> Đăng nhập
      </button>

    </div>
  </div>

  <div class="login-footer">
    <span style="color:var(--muted)">© 2026 ALN Platform — </span>
    <a href="#">Chính sách bảo mật</a>
  </div>

</div>

<script>
/* ════════════════════════════════════
   ACCOUNTS DATABASE
   Trong thực tế sẽ gọi API server.
   Ở đây dùng dữ liệu tĩnh để demo.
════════════════════════════════════ */
const ACCOUNTS = {
  kts: [
    { user:'kts.minhtran',  pw:'aln2026', name:'KTS. Trần Lê Minh',   file:'kts_dashboard.html', badge:'VIP Vàng' },
    { user:'kts.lanthi',    pw:'aln2026', name:'KTS. Nguyễn Thị Lan', file:'kts_dashboard.html', badge:'VIP Bạc' },
    { user:'kts.khoavu',    pw:'aln2026', name:'KTS. Vũ Minh Khoa',   file:'kts_dashboard.html', badge:'VIP Vàng' },
  ],
  dn: [
    { user:'dn.applamnha',  pw:'aln2026', name:'App Làm Nhà Corp.',    file:'client_DN.html',     badge:'Doanh nghiệp' },
    { user:'dn.alnconstruct',pw:'aln2026',name:'ALN Construct',        file:'client_DN.html',     badge:'Doanh nghiệp' },
  ],
  cn: [
    { user:'cn.thuannv',    pw:'aln2026', name:'Nguyễn Văn Thuận',    file:'client_CN.html',     badge:'Chủ nhà' },
    { user:'cn.binhtt',     pw:'aln2026', name:'Trần Thị Bình',       file:'client_CN.html',     badge:'Chủ nhà' },
    { user:'cn.cuonglq',    pw:'aln2026', name:'Lê Quang Cường',      file:'client_CN.html',     badge:'Chủ nhà' },
  ],
};

const ROLE_META = {
  kts: { icon:'🎨', title:'Kiến trúc sư', desc:'Quản lý dự án, bản vẽ & doanh thu', color:'var(--amber)',  bg:'rgba(255,170,51,.1)'  },
  dn:  { icon:'🏢', title:'Doanh nghiệp', desc:'Tổng quan danh mục & đội ngũ KTS',  color:'var(--blue)',   bg:'rgba(56,189,248,.1)'  },
  cn:  { icon:'👤', title:'Chủ nhà',      desc:'Theo dõi công trình & trao đổi KTS', color:'var(--green)',  bg:'rgba(34,201,122,.1)'  },
};

let activeRole = 'kts';

function switchRole(role){
  activeRole = role;
  // Update tabs
  document.querySelectorAll('.role-tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.role===role);
  });
  // Clear inputs & error
  document.getElementById('inputUser').value='';
  document.getElementById('inputPw').value='';
  hideError();
  // Re-render
  renderCardTop();
  renderDemoRow();
}

function renderCardTop(){
  const m = ROLE_META[activeRole];
  document.getElementById('cardTop').innerHTML = `
    <div class="role-label-row">
      <div class="role-icon-big" style="background:${m.bg};border:1.5px solid ${m.color}30">
        <span>${m.icon}</span>
      </div>
      <div>
        <div class="role-title">Đăng nhập — ${m.title}</div>
        <div class="role-desc">${m.desc}</div>
      </div>
    </div>`;
}

function renderDemoRow(){
  const accs = ACCOUNTS[activeRole];
  const m = ROLE_META[activeRole];
  document.getElementById('demoRow').innerHTML = accs.map(a=>`
    <button class="demo-btn" onclick="fillDemo('${a.user}','${a.pw}')">
      <div class="db-name">${a.name}</div>
      <div class="db-hint">${a.user}</div>
    </button>`).join('');
}

function fillDemo(user, pw){
  document.getElementById('inputUser').value = user;
  document.getElementById('inputPw').value = pw;
  hideError();
  // Subtle highlight
  document.getElementById('btnLogin').focus();
}

function togglePw(){
  const inp = document.getElementById('inputPw');
  const ico = document.getElementById('eyeIcon');
  if(inp.type==='password'){
    inp.type='text';
    ico.className='fa fa-eye-slash';
  } else {
    inp.type='password';
    ico.className='fa fa-eye';
  }
}

function hideError(){ document.getElementById('msgError').classList.remove('show'); }

function showError(msg){
  const el = document.getElementById('msgError');
  document.getElementById('msgErrorTxt').textContent = msg;
  el.classList.add('show');
  // Shake
  const card = document.querySelector('.login-card');
  card.style.animation='none';
  setTimeout(()=>{ card.style.animation='shake .35s ease'; },10);
}

function doLogin(){
  const user = document.getElementById('inputUser').value.trim().toLowerCase();
  const pw   = document.getElementById('inputPw').value;
  hideError();

  if(!user){ showError('Vui lòng nhập tên đăng nhập.'); document.getElementById('inputUser').focus(); return; }
  if(!pw)  { showError('Vui lòng nhập mật khẩu.'); document.getElementById('inputPw').focus(); return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-circle-notch fa-spin" style="margin-right:6px"></i> Đang kiểm tra...';

  // Simulate network delay
  setTimeout(()=>{
    const match = ACCOUNTS[activeRole].find(a=> a.user===user && a.pw===pw);

    if(!match){
      // Try other roles too for better UX
      let found = null;
      for(const role of ['kts','dn','cn']){
        const f = ACCOUNTS[role].find(a=> a.user===user && a.pw===pw);
        if(f){ found = {role, acc:f}; break; }
      }
      if(found){
        showError(`Tài khoản này thuộc vai trò "${ROLE_META[found.role].title}". Vui lòng chọn đúng loại tài khoản.`);
      } else {
        showError('Tên đăng nhập hoặc mật khẩu không đúng.');
      }
      btn.disabled=false;
      btn.innerHTML='<i class="fa fa-right-to-bracket" style="margin-right:6px"></i> Đăng nhập';
      return;
    }

    // SUCCESS — lưu user vào sessionStorage
    sessionStorage.setItem('aln_user', JSON.stringify({
      name: match.name,
      userId: match.user,
      role: activeRole,
      badge: match.badge,
    }));

    const m = ROLE_META[activeRole];
    const overlay = document.getElementById('redirectOverlay');
    document.getElementById('redirectMsg').textContent = `Xin chào, ${match.name}`;
    document.getElementById('redirectSub').textContent = `Đang vào trang ${m.title}...`;
    overlay.style.display='flex';

    setTimeout(()=>{
      window.location.href = match.file;
    }, 1400);

  }, 900);
}

/* Shake animation */
const styleSheet = document.createElement('style');
styleSheet.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}`;
document.head.appendChild(styleSheet);

/* Init */
renderCardTop();
renderDemoRow();
</script>
</body>
</html>
