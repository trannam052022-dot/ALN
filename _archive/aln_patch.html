<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ALN Admin Patch</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 24px; }
  .ok  { color: #0f0; }
  .err { color: #f44; }
  .warn { color: #fa0; }
  .log { margin: 4px 0; }
</style>
</head>
<body>
<h2 style="color:#fff">ALN Admin Patch v4 — Fix tên user + xoá user giả</h2>
<div id="out"><div class="log">Đang khởi tạo Firebase...</div></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, getDocs, query, where }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCPv-KbyK8ajRba1b2wy5qSwc--m_vbRUc",
  authDomain: "aln-platform.firebaseapp.com",
  projectId: "aln-platform",
  storageBucket: "aln-platform.firebasestorage.app",
  messagingSenderId: "1073827504988",
  appId: "1:1073827504988:web:8895fd6b68dff00a67d799"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, cls) {
  const div = document.createElement('div');
  div.className = 'log ' + (cls || 'ok');
  div.textContent = msg;
  document.getElementById('out').appendChild(div);
}

// 4 user thật + tên đúng
const REAL_USERS = {
  'h4kEguPEyMcwJwl89stc0Q6j2si2': { username:'founder.tranlong', name:'KTS. Trần Đại Long', role:'founder' },
  'kw5TgVDggIfboEqERS1cAphn3263': { username:'kts.tranlong',     name:'KTS. Trần Đại Long', role:'kts'     },
  'aTyHR3oQw6P87xpA9p8hTr2NbGA2': { username:'dn.tkhouse',       name:'Công ty TK House',    role:'dn'      },
  'G4RhRH5ECMYcE9aFcKYVn5Wdy952': { username:'cn.trannam',       name:'Trần Nam',            role:'cn'      },
};
const KEEP_UIDS = new Set(Object.keys(REAL_USERS));

onAuthStateChanged(auth, async (user) => {
  if (!user) { log('Chưa đăng nhập. Đăng nhập founder trước.', 'err'); return; }
  const FOUNDER_UID = 'h4kEguPEyMcwJwl89stc0Q6j2si2';
  if (user.uid !== FOUNDER_UID) { log('Cần đăng nhập founder', 'err'); return; }
  log('Đăng nhập: ' + user.uid);

  // BƯỚC 1: Fix tên đúng cho 4 user thật
  log('--- Bước 1: Fix tên 4 user thật ---');
  for (const [uid, data] of Object.entries(REAL_USERS)) {
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists()) {
        const cur = snap.data();
        if (cur.name !== data.name) {
          await updateDoc(doc(db, 'users', uid), { name: data.name });
          log('  FIX: ' + uid.slice(0,8) + '... ' + (cur.name||'(trống)') + ' → ' + data.name, 'ok');
        } else {
          log('  OK:  ' + uid.slice(0,8) + '... ' + data.name + ' (đúng rồi)', 'warn');
        }
      } else {
        await setDoc(doc(db, 'users', uid), { uid, ...data, status:'active', email: data.username+'@aln.vn' });
        log('  TẠO: ' + uid.slice(0,8) + '... ' + data.name, 'ok');
      }
    } catch(e) { log('  LỖI ' + uid.slice(0,8) + ': ' + e.message, 'err'); }
  }

  // BƯỚC 2: Xoá user giả (mọi role, ngoài 4 UID thật)
  log('--- Bước 2: Xoá user giả ---');
  try {
    const allSnap = await getDocs(collection(db, 'users'));
    log('Tổng users trong Firestore: ' + allSnap.size);
    for (const d of allSnap.docs) {
      if (KEEP_UIDS.has(d.id)) {
        log('  GIỮ: ' + d.id.slice(0,8) + '... (' + (d.data().name||d.data().username) + ')', 'warn');
      } else {
        log('  XOÁ: ' + d.id.slice(0,8) + '... (' + (d.data().name||d.data().username||d.data().role) + ')', 'err');
        await deleteDoc(doc(db, 'users', d.id));
        log('    → Đã xoá', 'ok');
      }
    }
  } catch(e) { log('LỖI bước 2: ' + e.message, 'err'); }

  log('');
  log('XONG! Kết quả:', 'ok');
  log('  cn.trannam   → Trần Nam', 'ok');
  log('  dn.tkhouse   → Công ty TK House', 'ok');
  log('  kts.tranlong → KTS. Trần Đại Long', 'ok');
  log('Đóng trang này, xoá cache browser (Ctrl+Shift+R) rồi đăng nhập lại.', 'warn');
});
</script>
</body>
</html>
