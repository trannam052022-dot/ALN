name: ALN Cẩm nang — Tự động đăng bài hẹn ngày

# Chạy mỗi ngày 6:00 sáng giờ Việt Nam (UTC+7 = UTC 23:00 hôm trước).
# Build script tự lọc bài theo "publishDate" trong frontmatter — bài nào đã
# tới ngày (giờ VN) sẽ được sinh ra + commit. Bộ lọc dùng "<= hôm nay" nên nếu
# 1 lần chạy bị lỗi, lần chạy thành công kế tiếp tự đăng bù bài bị trễ — không
# cần can thiệp tay.
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: # Cho phép chạy tay bất kỳ lúc nào để kiểm tra

concurrency:
  group: publish-cam-nang
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build Cẩm nang (lọc bài theo publishDate)
        id: build
        env:
          CAM_NANG_FB_SECRET: ${{ secrets.CAM_NANG_FB_SECRET }}
        run: node scripts/build-cam-nang.js

      - name: Commit + push nếu có bài tới ngày đăng hôm nay
        run: |
          git config user.name "ALN Cam Nang Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Không có bài nào tới ngày đăng hôm nay — không commit."
          else
            git commit -m "Tự động đăng bài Cẩm nang đến ngày hẹn"
            git push
          fi

      # Web đã publish xong ở bước trên dù bước dưới đây có fail — bước này chỉ
      # làm tab Actions hiện đỏ + (nếu bật email thông báo Actions) email Founder
      # khi có bài đăng Facebook thất bại, để không "im lặng" bỏ qua lỗi FB.
      - name: Báo lỗi nếu có bài đăng Facebook thất bại
        if: always() && steps.build.outputs.fb_failures != '' && steps.build.outputs.fb_failures != '0'
        run: |
          echo "::error::${{ steps.build.outputs.fb_failures }} bài Cẩm nang đăng Facebook thất bại hôm nay — xem log bước 'Build Cẩm nang' ở trên. Founder cũng đã nhận thông báo push trong app."
          exit 1
