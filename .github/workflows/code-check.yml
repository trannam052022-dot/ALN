name: ALN Code Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kiểm tra emoji còn sót trong UI
        run: |
          echo "=== Tìm emoji trong HTML files ==="
          FILES="client_CN.html client_DN.html kts_dashboard.html founder_panel.html login.html"
          FOUND=0
          for f in $FILES; do
            if [ -f "$f" ]; then
              LINES=$(grep -nP "[\x{1F300}-\x{1F9FF}]|[\x{2600}-\x{26FF}]|[\x{2700}-\x{27BF}]|✅|❌|⏳|🔒|📄|📐|📎|⚠️|📤" "$f" 2>/dev/null || true)
              if [ -n "$LINES" ]; then
                echo "⚠️  $f có emoji:"
                echo "$LINES"
                FOUND=1
              else
                echo "✓ $f — sạch"
              fi
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "::warning::Còn emoji chưa thay bằng Phosphor icons"
          fi

      - name: Kiểm tra màu hardcode tối (dark theme còn sót)
        run: |
          echo "=== Tìm dark inline styles ==="
          DARK=$(grep -rn "rgba(255,255,255,\.0[0-9])" client_DN.html client_CN.html 2>/dev/null || true)
          if [ -n "$DARK" ]; then
            echo "::warning::Tìm thấy near-transparent dark backgrounds:"
            echo "$DARK"
          else
            echo "✓ Không có dark rgba còn sót"
          fi

      - name: Kiểm tra thẻ HTML đóng đủ không
        run: |
          echo "=== Kiểm tra </head></body></html> ==="
          for f in client_CN.html client_DN.html kts_dashboard.html founder_panel.html login.html; do
            if [ -f "$f" ]; then
              MISSING=""
              grep -q "</head>" "$f" || MISSING="$MISSING </head>"
              grep -q "</body>" "$f" || MISSING="$MISSING </body>"
              grep -q "</html>" "$f" || MISSING="$MISSING </html>"
              if [ -n "$MISSING" ]; then
                echo "::error::$f thiếu thẻ:$MISSING"
              else
                echo "✓ $f — đủ thẻ"
              fi
            fi
          done

      - name: Kiểm tra GA4 trên mọi trang công khai
        run: |
          echo "=== Kiểm tra thẻ GA4 (G-5CSL1TF0RC) ==="
          # Trang nội bộ / draft / redirect — không cần GA
          SKIP="client_CN.html client_DN.html kts_dashboard.html designer_dashboard.html ks_dashboard.html ktv_dashboard.html founder_panel.html founder_forum.html founder_kts_creator_draft.html kts_landing_draft.html board-editor.html seed.html home.html ALN_MatranKy_KhungBV.html"
          FAIL=0
          while IFS= read -r f; do
            base=$(basename "$f")
            skip=0
            for s in $SKIP; do [ "$base" = "$s" ] && skip=1; done
            [ $skip -eq 1 ] && continue
            N=$(grep -c "googletagmanager.com/gtag" "$f" || true)
            if [ "$N" = "0" ]; then
              echo "::error::$f THIẾU thẻ GA4 — mọi trang công khai phải được đo lường"
              FAIL=1
            elif [ "$N" != "1" ]; then
              echo "::error::$f có $N thẻ GA4 (trùng lặp)"
              FAIL=1
            fi
          done < <(find . -name "*.html" -not -path "./_archive/*" -not -path "./test/*" -not -path "./node_modules/*" -not -path "./functions/*" -not -path "./.git/*")
          if [ $FAIL -eq 0 ]; then
            echo "✓ Tất cả trang công khai đều có đúng 1 thẻ GA4"
          else
            exit 1
          fi

      - name: Kiểm tra Pixel/CAPI trên phễu lead (thiet-ke-nha/mau/du-toan/recruit)
        run: |
          echo "=== Kiểm tra Meta Pixel + capture fbp/fbc trên các trang có form lead ==="
          # Nhận diện trang có form lead thật (sinh từ tools/template-tinh.html /
          # template-mau.html / template-dutoan.html) qua tên hàm callable — trang
          # hub/index (thiet-ke-nha/index.html, mau/index.html...) không có form nên bỏ qua.
          FAIL=0
          while IFS= read -r f; do
            grep -qE "'submitLocalLead'|'submitMauLead'|'submitDuToanLead'" "$f" || continue
            N=$(grep -c "fbq('init', '1656666692225878')" "$f" || true)
            FBP=$(grep -cE "getCookie\('_fbp'\)|alnGetFbp" "$f" || true)
            if [ "$N" != "1" ]; then
              echo "::error::$f có $N thẻ Meta Pixel init (cần đúng 1) — lead sẽ không đo được CPL thật"
              FAIL=1
            fi
            if [ "$FBP" = "0" ]; then
              echo "::error::$f THIẾU capture fbp/fbc — CAPI mất tín hiệu khớp với Pixel, dễ đếm trùng/thiếu"
              FAIL=1
            fi
          done < <(find thiet-ke-nha mau du-toan -name "*.html" 2>/dev/null)
          # recruit.html: landing quảng cáo, phải tự bắt UTM/fbclid trước khi chuyển
          # sang funnel đăng ký thật (kts-apply/dn-studio/designer-apply)
          if [ -f recruit.html ]; then
            grep -q "fbq('init', '1656666692225878')" recruit.html || { echo "::error::recruit.html THIẾU Meta Pixel init"; FAIL=1; }
            grep -qE "alnGetFbp|getCookie\('_fbp'\)" recruit.html || { echo "::error::recruit.html THIẾU capture fbp/fbc"; FAIL=1; }
            grep -q "utm_" recruit.html || { echo "::error::recruit.html THIẾU bắt UTM từ URL quảng cáo"; FAIL=1; }
          fi
          if [ $FAIL -eq 0 ]; then
            echo "✓ Mọi trang lead trong thiet-ke-nha/mau/du-toan + recruit.html đều đủ Pixel/CAPI tracking"
          else
            echo ""
            echo "::error::Nếu trang này vừa được sửa tay (không qua tools/template-*.html), hãy sinh lại từ template hoặc thêm Pixel/CAPI thủ công theo commit bf14616"
            exit 1
          fi

      - name: Kích thước file
        run: |
          echo "=== File sizes ==="
          for f in *.html firebase-config.js; do
            if [ -f "$f" ]; then
              SIZE=$(wc -l < "$f")
              BYTES=$(wc -c < "$f")
              KB=$(( BYTES / 1024 ))
              if [ $KB -gt 200 ]; then
                echo "::warning::$f — ${SIZE} dòng / ${KB}KB (lớn, cân nhắc tách)"
              else
                echo "✓ $f — ${SIZE} dòng / ${KB}KB"
              fi
            fi
          done
