<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ALN Admin Patch</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 24px; }
  .ok  { color: #0f0; }
  .err { color: #f44; }
  .warn { color: #fa0; }
  .log { margin: 4px 0; }
</style>
</head>
<body>
<h2 style="color:#fff">ALN Admin Patch v3 — Xoá user giả</h2>
<div id="out"><div class="log">Đang khởi tạo Firebase...</div></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, deleteDoc, collection, getDocs, query, where }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCPv-KbyK8ajRba1b2wy5qSwc--m_vbRUc",
  authDomain: "aln-platform.firebaseapp.com",
  projectId: "aln-platform",
  storageBucket: "aln-platform.firebasestorage.app",
  messagingSenderId: "1073827504988",
  appId: "1:1073827504988:web:8895fd6b68dff00a67d799"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, cls) {
  const div = document.createElement('div');
  div.className = 'log ' + (cls || 'ok');
  div.textContent = msg;
  document.getElementById('out').appendChild(div);
}

// UID thật — GIỮ LẠI, không xoá
const KEEP_UIDS = new Set([
  'h4kEguPEyMcwJwl89stc0Q6j2si2', // founder.tranlong
  'kw5TgVDggIfboEqERS1cAphn3263', // kts.tranlong
  'aTyHR3oQw6P87xpA9p8hTr2NbGA2', // dn.tkhouse
  'G4RhRH5ECMYcE9aFcKYVn5Wdy952', // cn.trannam
]);

onAuthStateChanged(auth, async (user) => {
  if (!user) { log('Chưa đăng nhập. Đăng nhập founder trước.', 'err'); return; }

  const FOUNDER_UID = 'h4kEguPEyMcwJwl89stc0Q6j2si2';
  if (user.uid !== FOUNDER_UID) { log('Cần đăng nhập founder', 'err'); return; }
  log('Đăng nhập: ' + user.uid);

  // Xoá KTS giả
  log('--- Kiểm tra KTS ---');
  try {
    const snap = await getDocs(query(collection(db, 'users'), where('role', '==', 'kts')));
    log('Tìm thấy ' + snap.size + ' KTS trong Firestore');
    for (const d of snap.docs) {
      if (KEEP_UIDS.has(d.id)) {
        log('  GIỮ: ' + d.id + ' (' + (d.data().name || d.data().username) + ')', 'warn');
      } else {
        log('  XOÁ: ' + d.id + ' (' + (d.data().name || d.data().username) + ')', 'err');
        await deleteDoc(doc(db, 'users', d.id));
        log('  → Đã xoá', 'ok');
      }
    }
  } catch(e) { log('LỖI KTS: ' + e.message, 'err'); }

  // Xoá DN giả
  log('--- Kiểm tra DN ---');
  try {
    const snap2 = await getDocs(query(collection(db, 'users'), where('role', '==', 'dn')));
    log('Tìm thấy ' + snap2.size + ' DN trong Firestore');
    for (const d of snap2.docs) {
      if (KEEP_UIDS.has(d.id)) {
        log('  GIỮ: ' + d.id + ' (' + (d.data().name || d.data().username) + ')', 'warn');
      } else {
        log('  XOÁ: ' + d.id + ' (' + (d.data().name || d.data().username) + ')', 'err');
        await deleteDoc(doc(db, 'users', d.id));
        log('  → Đã xoá', 'ok');
      }
    }
  } catch(e) { log('LỖI DN: ' + e.message, 'err'); }

  // Xoá CN giả (ngoài cn.trannam)
  log('--- Kiểm tra CN ---');
  try {
    const snap3 = await getDocs(query(collection(db, 'users'), where('role', '==', 'cn')));
    log('Tìm thấy ' + snap3.size + ' CN trong Firestore');
    for (const d of snap3.docs) {
      if (KEEP_UIDS.has(d.id)) {
        log('  GIỮ: ' + d.id + ' (' + (d.data().name || d.data().username) + ')', 'warn');
      } else {
        log('  XOÁ: ' + d.id + ' (' + (d.data().name || d.data().username) + ')', 'err');
        await deleteDoc(doc(db, 'users', d.id));
        log('  → Đã xoá', 'ok');
      }
    }
  } catch(e) { log('LỖI CN: ' + e.message, 'err'); }

  log('');
  log('XONG! Còn lại đúng 4 user thật:', 'ok');
  log('  founder.tranlong / kts.tranlong / dn.tkhouse / cn.trannam', 'ok');
});
</script>
</body>
</html>
