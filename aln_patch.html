<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ALN Admin Patch</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 24px; }
  .ok  { color: #0f0; }
  .err { color: #f44; }
  .warn { color: #fa0; }
  .log { margin: 4px 0; }
</style>
</head>
<body>
<h2 style="color:#fff">ALN Admin Patch v2</h2>
<div id="out"><div class="log">Đang khởi tạo Firebase...</div></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCPv-KbyK8ajRba1b2wy5qSwc--m_vbRUc",
  authDomain: "aln-platform.firebaseapp.com",
  projectId: "aln-platform",
  storageBucket: "aln-platform.firebasestorage.app",
  messagingSenderId: "1073827504988",
  appId: "1:1073827504988:web:8895fd6b68dff00a67d799"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function log(msg, cls) {
  const div = document.createElement('div');
  div.className = 'log ' + (cls || 'ok');
  div.textContent = msg;
  document.getElementById('out').appendChild(div);
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { log('Chua dang nhap. Dang nhap founder truoc.', 'err'); return; }
  log('User: ' + user.uid);

  const FOUNDER_UID = 'h4kEguPEyMcwJwl89stc0Q6j2si2';
  if (user.uid !== FOUNDER_UID) { log('Can dang nhap founder', 'err'); return; }

  // BUOC 1: Kiem tra ALN-8821
  try {
    const snap = await getDoc(doc(db, 'projects', 'ALN-8821'));
    if (snap.exists()) {
      log('ALN-8821 da ton tai — bo qua', 'warn');
    } else {
      log('Tao ALN-8821...');
      await setDoc(doc(db, 'projects', 'ALN-8821'), {
        code: 'ALN-8821',
        name: 'Nha Pho',
        stage: 'C2',
        status: 'on_track',
        cn:  { uid: 'G4RhRH5ECMYcE9aFcKYVn5Wdy952', name: 'Tran Nam', username: 'cn.trannam' },
        kts: { uid: 'kw5TgVDggIfboEqERS1cAphn3263', name: 'KTS. Tran Dai Long', username: 'kts.tranlong' },
        memberUids: ['G4RhRH5ECMYcE9aFcKYVn5Wdy952', 'kw5TgVDggIfboEqERS1cAphn3263'],
        progress: { C1: 1, C2: 0.4, C3: 0, C4: 0 },
        totalFee: 850000000,
        escrowBalance: 500000000,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      log('OK: ALN-8821 tao xong');
    }
  } catch(e) { log('LOI ALN-8821: ' + e.message, 'err'); return; }

  // BUOC 2: Kiem tra va tao lai ALN-9921 (thuan DN)
  try {
    const snap2 = await getDoc(doc(db, 'projects', 'ALN-9921'));
    if (snap2.exists()) {
      const d = snap2.data();
      if (d.cn && d.cn.uid) {
        log('ALN-9921 van con field cn — can xoa va chay lai', 'err');
        log('  => Vao Firebase Console xoa document projects/ALN-9921 roi chay lai trang nay', 'err');
      } else {
        log('ALN-9921 OK — khong co field cn', 'ok');
      }
    } else {
      log('ALN-9921 da xoa — dang tao lai (thuan DN)...');
      await setDoc(doc(db, 'projects', 'ALN-9921'), {
        code: 'ALN-9921',
        name: 'Biet thu Vuon Tan Co Dien',
        stage: 'C3',
        status: 'on_track',
        kts: { uid: 'kw5TgVDggIfboEqERS1cAphn3263', name: 'KTS. Tran Dai Long', username: 'kts.tranlong' },
        dn:  { uid: 'aTyHR3oQw6P87xpA9p8hTr2NbGA2', name: 'Cong ty TK House', username: 'dn.tkhouse' },
        memberUids: ['kw5TgVDggIfboEqERS1cAphn3263', 'aTyHR3oQw6P87xpA9p8hTr2NbGA2'],
        progress: { C1: 1, C2: 1, C3: 0, C4: 0 },
        totalFee: 125000000,
        escrowBalance: 75000000,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      log('OK: ALN-9921 tao lai thanh cong (thuan DN, khong co CN)');
    }
  } catch(e) { log('LOI ALN-9921: ' + e.message, 'err'); return; }

  log('');
  log('XONG! Dong trang nay.');
  log('  CN (cn.trannam)     => 1 du an: ALN-CN-8821');
  log('  DN (dn.tkhouse)     => 1 du an: ALN-DN-9921');
  log('  KTS (kts.tranlong)  => 2 du an: ALN-CN-8821 + ALN-DN-9921');
});
</script>
</body>
</html>
